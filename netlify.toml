[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/api/ping"
  to = "/.netlify/functions/ping"
  status = 200
  force = true

[[redirects]]
  from = "/api/ai-consult"
  to = "/.netlify/functions/ai-consult"
  status = 200
  force = true

[[redirects]]
  from = "/api/delete-user"
  to = "/.netlify/functions/delete-user"
  status = 200
  force = true

[[redirects]]
  from = "/api/portone-webhook"
  to = "/.netlify/functions/portone-webhook"
  status = 200
  force = true

[[redirects]]
  from = "/api/scrape-dealbaron"
  to = "/.netlify/functions/scrape-dealbaron"
  status = 200
  force = true

[functions."smm-sync-initial-count"]
  schedule = "*/5 * * * *"

[functions."smm-hourly-order-check"]
  schedule = "0 * * * *"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
