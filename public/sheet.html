      { cat:'온라인카지노', title:'돈 잃는 건 왜 이렇게 빠른지...', body:'진짜 돈 잃는 속도는 엄청 빠르네요\n100만원 사라지는 건 순식간인데\n버는 건 왜 이렇게 힘든지 모르겠습니다\n쓴 것도 아니고 그냥 날아간 기분이라\n더 허탈하네요...', rtitle:'진짜 뭐이리 쉽노? 고생하셨습니다... 힘내세요.ㅠ', rbody:'진짜 뭐이리 쉽노???\n100만원 날리는거 말이야ㅡㅡ\nㅈㄴ 버는건 힘든데 썼다고 하기도 애매하노 걍 날리기는 쉽다쉬워...', c1:'고생하셨습니다...', c2:'힘내세요.ㅠ', c3:'ㄷㄷ 좀 크긴하네', link:'https://cafe.naver.com/f-e/cafes/22765223/articles/8448?boardtype=L&referrerAllArticles=true&page=372', date:'2025.08.21' },
      { cat:'온라인카지노', title:'손이 아직도 떨리네요...', body:'진짜 아까는 끝까지 밀리는 줄 알았습니다\n완전 바닥까지 내려갔는데\n어차피 여기까지 왔으니 해보자는 마음으로\n500짜리 들어갔다가 겨우 살아났네요\n지금 생각해도 손이 덜덜 떨립니다\n이제는 진짜 정신 좀 차려야겠어요', rtitle:'손떨린다.... 와....ㄷㄷ 당분간 사리시길ㄷㄷㄷ', rbody:'하 지금도 손이 덜덜 떨리네요.... 진짜 나락도 완전 지옥 끝까지 갔었습니다... 어차피 나락인거 더 떨어져봐야 다르겠냐는 마음으로 500짜리 던지고 살아났네요.... 진짜 진짜 정신차려야겠음...', c1:'승률자체가 ...', c2:'좋으셨넹', c3:'배팅금액이 ㄷㄷㄷ', link:'https://cafe.naver.com/f-e/cafes/22765223/articles/8450?boardtype=L&referrerAllArticles=true&page=372', date:'2025.08.21' },
      { cat:'강원랜드', title:'린카 생각보다 괜찮네요', body:'컨벤션호텔 쪽 린카 다녀왔는데\n생각보다 만족스러웠습니다\n음식도 괜찮고 가격도 크게 부담 없더라구요\n팬지랑 비교하니까 차이가 꽤 느껴졌습니다\n특히 물컵 관리 상태 보고는\n팬지는 한동안 안 갈 것 같네요', rtitle:'와~ 이렇게 비교가된다고? 일식집 먹을만한가보네요 저도 들려봐야겟습니다ㅎ', rbody:'새로생긴 컨벤션호텔쪽 린카 괜찬네요\n맛도 괜찮고 가격도 이정도면 무난하다? 특히 팬지랑 비교하다보니까 끝도없네요\n물컵도 제대로안씻는 더러운 팬지는 다신안갈듯', c1:'일식집 먹을만한가보네요', c2:'저도 들려봐야겟습니다ㅎ', c3:'아무리 찾아봐도 없더니^^ 메인호텔이 아니였군요', link:'https://cafe.naver.com/f-e/cafes/25683718/articles/63978?boardtype=L&referrerAllArticles=true&page=574', date:'2026.01.24' },
      { cat:'강원랜드', title:'전자카드 충전 한도가 있나요?', body:'하루 290까지 채우면\n더 이상 충전이 안 되는 건가요? 잃은 건 아닌데 출금했다가 다시 넣으려고 하니까\n무인 충전이 안 되네요\n아시는 분 계시면 알려주세요', rtitle:'전자카드 충전한도 일일한도300으로 알고있습니다', rbody:'하루290 다채우면 더이상 충전 안되나요? 진건 아닌데 출금했다 입금 했다하니 무인으론 충전 안되네요', c1:'일일한도300으로 알고있습니다', c2:'', c3:'', link:'https://cafe.naver.com/f-e/cafes/25683718/articles/63951?boardtype=L&referrerAllArticles=true&page=576', date:'2026.01.24' },
      { cat:'강원랜드', title:'강원랜드 알림은 참 빠르네요ㅋㅋ', body:'예전에 털리고 왔을 때는 못 본 것 같은데\n어제 조금 따고 나오니까 바로 알림톡이 오네요ㅋㅋ\n또 오라고 유혹하는 것 같아서 웃기기도 하고\n괜히 또 흔들리게 하네요 ㅋㅋ\n오늘 불금인데 예약은 못 했지만\n한 번 가볼까 합니다 ㅋㅋㅋ', rtitle:'어마무시한 강원랜드놈들 우왕 백만칩 첨봐유', rbody:'탈탈 털리고왔을땐 못 받아 본거같은데\n돈따고 오니깐 득달같이 울리는 알림톡 ㅋ\n또 오게 해서 털어갈려는 수작 모를줄알고\n귀신같이 꼬십니다 ㅋ', c1:'우왕 백만칩 첨봐유', c2:'저는 털리고 왔는데도', c3:'어제헉저 ㅋㅌ이', link:'https://cafe.naver.com/f-e/cafes/25683718/articles/63958?boardtype=L&referrerAllArticles=true&page=575', date:'2026.01.24' },
      { cat:'온라인카지노', title:'이 정도면 만족해야죠ㅋㅋ', body:'이 정도면 괜찮게 마무리한 것 같습니다ㅋㅋ\n베팅도 크게 흔들리지 않고\n계속 비슷한 금액으로만 갔네요\n먹고 잃고 반복하다가\n흐름 아니다 싶을 때 바로 나왔습니다\n오늘은 만족하고 마감합니다ㅎㅎ', rtitle:'적당하죠???ㅋㅋㅋ 아주 나이스하구만요 많이 괜춘한디', rbody:'뭐 이정도면 적당하죠???ㅋㅋㅋㅋ\n빠따는 계속 평균적으로 돌리고 분노벳 없이 일정하게 했습니다\n그냥 먹죽먹죽 하면서 타이밍 보고 안될거 같을 때 바로 빠져나왔네여\n77ㅓ억 수익 냐미~~', c1:'아주 나이스하구만요', c2:'많이 괜춘한디', c3:'저도오늘 35만 먹음 ㅋㅋ', link:'https://cafe.naver.com/f-e/cafes/22765223/articles/8456?boardtype=L&referrerAllArticles=true&page=372', date:'2025.08.21' },

    entries: [
      { cat:'온라인카지노', title:'10만원 잃었지만 여기서 멈춥니다', body:'10만원 잃었지만 오늘은 재충전 안 하려구요\n처음에 100만원 충전해서 시작했고\n200만원까지 갔는데 욕심내다가 결국 본전까지 내려왔네요\n조금 더 해보다가 90만원 남았을 때\n더 하면 크게 무너질 것 같은 느낌이 들어서 출금했습니다\n아쉽긴 하지만 여기서 멈추는 게 제 원칙이라 참아봅니다', rtitle:'10만원 잃었지만,, 재충전안하기로 이분나락갈일은 없을듯 잘하셨습니다^^', rbody:'10만원 잃었지만,, 재충전안하기로\n오늘 큰맘먹고 크게보고 100만원 충전했어요\n뭐 200만원까지 갔었지만 땄을때 그만할걸 욕심내가지고\n어느순간 연패하더니 순식간에 본전이더라구요\n좀더 해봤지만 또 지고해서 90만원상태에서 나락갈거같은느낌이\n너무많이들어서 멈춤,, 출금했고 재충전하고는싶지만\n여기서 멈추려구요,, 제철칙이니까.^^', c1:'이분나락갈일은 없을듯', c2:'잘하셨습니다^^', c3:'', link:'https://cafe.naver.com/f-e/cafes/22765223/articles/8461?boardtype=L&referrerAllArticles=true&page=371\n모두의강원랜드 https://cafe.naver.com/f-e/cafes/24142709/menus/0?page=267', date:'2025.08.21' },
      { cat:'강원랜드', title:'강랜 갈 때마다 들르는 사북 맛집이에요', body:'사북 가면 고기 말고 다른 메뉴가 생각날 때가 있더라구요\n그럴 때는 해물찜 먹으러 갑니다\n아구찜 소자가 48000원인데\n매운맛도 조절 가능해서 저는 항상 덜 맵게 부탁드려요\n마지막에 볶음밥까지 먹으면 든든해서 만족도가 높습니다', rtitle:'강원랜드갈때마다 혼밥하러 가는 최애 사북맛집 다음에함가봐야겠어요~~~', rbody:'사북에서 고기말고 다른게 먹고싶을땐 해물찜^^ 아구찜 소 48000원이고\n매운맛 조절이 되어서 저는 살짝 덜맵게 해달라고합니다\n다 먹고나면 밥도 볶아 먹을수있어 든든합니다', c1:'다음에함가봐야겠어요~~~', c2:'혼밥이 ㅎ 48,000원이면 좀 비싼거 아닌가요', c3:'식당 이름이 뭘까용?', link:'https://cafe.naver.com/f-e/cafes/25683718/articles/63957?boardtype=L&referrerAllArticles=true&page=575', date:'2026.01.24' },
      { cat:'강원랜드', title:'예약하면 몇 시간 이용 가능한가요?', body:'자리 예약하면\n몇 시간 정도 계속 앉아 있을 수 있나요? 중간에 잠깐 나갔다 오면\n이용 시간도 같이 차감되는지 궁금합니다', rtitle:'몇시간인가요 3 3시간 이고 시간차감되요', rbody:'자리예약하면 몇시간동안앉아있을수있나요\n중간에 나갓다와도시간까이나요', c1:'3시간 이고', c2:'시간차감되요', c3:'', link:'https://cafe.naver.com/f-e/cafes/25683718/articles/63974?boardtype=L&referrerAllArticles=true&page=574', date:'2026.01.24' },
      { cat:'강원랜드', title:'언덕 주차장은 왠지 불안하네요', body:'이상하게 지하주차장에 세우면 승률이 좋은데\n언덕 주차장에만 주차하면 결과가 별로더라구요\n오늘 출발하면 10시쯤 도착할 것 같은데\n그 시간에도 지하주차장 자리 있을까요?', rtitle:'언덕주차장이 싫다 주말이라 안될거같은데요 정 가고싶으심 발렛맡겨보세요', rbody:'지하주차장에 세우면 승률이 70%이상\n반대로 언덕주차장에만 세우면 승률 바닥을칩니다\n지금 출발한다면 10시쯤 도착할거같은디\n지하주차장에 박아넣을수있을깝쇼?', c1:'주말이라 안될거같은데요', c2:'정 가고싶으심 발렛맡겨보세요', c3:'날씨 오늘 별로 안춥지요. 운동삼아 걸어오새요', link:'https://cafe.naver.com/f-e/cafes/25683718/articles/63977?boardtype=L&referrerAllArticles=true&page=574', date:'2026.01.24' },
      { cat:'해외원정', title:'클락 여행 견적 얼마나 들까요?', body:'클락에서 5박~6박 정도 생각하고 있습니다\n골프는 유명한 구장에서 2~3게임 정도 예정이고\n숙소는 괜찮은 풀빌라로 알아보고 있습니다\n식비나 술값은 상황에 따라 다를 것 같고\n기본적으로 전체 비용이 어느 정도 나오는지 궁금합니다', rtitle:'견적 얼마나 나올까요??? 마사지나 다른것도 포함해야 하는거 아닌감', rbody:'클락에 5박~6박정도 할 예정이구요\n골프는 그냥 유명하고 좋은 무난한 구장에서 2~3게임\n숙박은 풀빌라(급 좋은곳) 일단 이정도는 고정비용일테고 나머지 먹고마시고 하는건 그때그때 상황에 따라 달라질테니... 전체적으로 얼마나 드는지 견적 먼저 좀 받아볼 수 있을까요', c1:'마사지나 다른것도 포함해야 하는거 아닌감', c2:'문의 주세요!', c3:'', link:'https://cafe.naver.com/f-e/cafes/22765223/articles/8454?boardtype=L&referrerAllArticles=true&page=372', date:'2025.08.21' },

// ─────────────────────────────────────────────
// Render
// ─────────────────────────────────────────────
let sections = [];

function ce(tag, attrs={}, ...children) {
  const el = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs)) {
    if (k === 'class') el.className = v;
    else el.setAttribute(k, v);
  }
  for (const c of children) {
    if (typeof c === 'string') el.appendChild(document.createTextNode(c));
    else if (c) el.appendChild(c);
  }
  return el;
}

function makeEditable(ph='') {
  const div = document.createElement('div');
  div.contentEditable = 'true';
  div.setAttribute('data-ph', ph);
  div.spellcheck = false;
  return div;
}

function editableCell(cls, ph='', initText='', rowspan=1, colspan=1) {
  const td = document.createElement('td');
  if (cls) td.className = cls;
  if (rowspan > 1) td.rowSpan = rowspan;
  if (colspan > 1) td.colSpan = colspan;
  const d = makeEditable(ph);
  if (cls && cls.includes('main-text')) d.className = 'main-text';
  if (cls && cls.includes('comment-text')) d.className = 'comment-text';
  d.textContent = initText || '';
  td.appendChild(d);
  return td;
}

function renderSection(sec, idx) {
  const tbody = document.getElementById('sheetBody');
  const sectionId = `section-${sec.id}`;

  // ── Section header row ──
  const hrow = document.createElement('tr');
  hrow.className = 'section-header';
  hrow.id = sectionId;

  // Name cell (editable)
  const nameCell = document.createElement('td');
  nameCell.colSpan = 3;
  nameCell.style.background = '#ff0000';
  nameCell.style.color = '#fff';
  nameCell.style.fontWeight = 'bold';
  const nameDiv = makeEditable('섹션명');
  nameDiv.style.color = '#fff';
  nameDiv.textContent = sec.name;
  nameCell.appendChild(nameDiv);
  // Tags in same cell area (smaller text below)
  if (sec.tags) {
    const tagDiv = document.createElement('div');
    tagDiv.style.fontSize = '9px'; tagDiv.style.marginTop = '3px'; tagDiv.style.opacity = '0.9';
    tagDiv.style.color = '#fff';
    tagDiv.textContent = sec.tags;
    nameCell.appendChild(tagDiv);
  }
  hrow.appendChild(nameCell);

  const emptyHdr = document.createElement('td');
  emptyHdr.colSpan = 2;
  emptyHdr.style.background = '#ff0000';
  hrow.appendChild(emptyHdr);

  ['댓글1','댓글2','댓글3'].forEach(lbl => {
    const c = document.createElement('td');
    c.className = 'comment-h';
    c.style.background = '#ff0000'; c.style.color = '#fff';
    c.style.textAlign = 'center'; c.style.fontWeight = 'bold';
    c.textContent = lbl;
    hrow.appendChild(c);
  });

  const metaCell = document.createElement('td');
  metaCell.className = 'meta-cell';
  const metaDiv = makeEditable('메타/링크');
  metaDiv.style.fontSize = '9px'; metaDiv.style.color = '#fff';
  metaDiv.textContent = sec.metaHeader || '';
  metaCell.appendChild(metaDiv);

  // Add/delete buttons
  const btnDiv = document.createElement('div');
  btnDiv.style.marginTop = '4px';
  const addBtn = document.createElement('button');
  addBtn.textContent = '+ 행 추가';
  addBtn.style.cssText = 'font-size:9px;padding:1px 5px;cursor:pointer;background:#fff;color:#333;border:1px solid #ccc;border-radius:2px;margin-right:3px;';
  addBtn.onclick = () => addEntry(sec.id);
  const delBtn = document.createElement('button');
  delBtn.textContent = '섹션 삭제';
  delBtn.style.cssText = 'font-size:9px;padding:1px 5px;cursor:pointer;background:#fdd;color:#900;border:1px solid #ccc;border-radius:2px;';
  delBtn.onclick = () => deleteSection(sec.id);
  btnDiv.appendChild(addBtn);
  btnDiv.appendChild(delBtn);
  metaCell.appendChild(btnDiv);
  hrow.appendChild(metaCell);

  tbody.appendChild(hrow);

  // ── Entries ──
  sec.entries.forEach((entry, ei) => {
    renderEntry(sec.id, entry, ei);
  });

  // ── Add entry row ──
  const addRow = document.createElement('tr');
  addRow.className = 'add-row';
  addRow.id = `add-row-${sec.id}`;
  const addTd = document.createElement('td');
  addTd.colSpan = 9;
  const ab = document.createElement('button');
  ab.textContent = `+ "${sec.name}" 에 행 추가`;
  ab.onclick = () => addEntry(sec.id);
  addTd.appendChild(ab);
  addRow.appendChild(addTd);
  tbody.appendChild(addRow);
}

function renderEntry(secId, entry, ei) {
  const tbody = document.getElementById('sheetBody');
  const addRowEl = document.getElementById(`add-row-${secId}`);
  const insertBefore = addRowEl || null;

  // ── Title row ──
  const trow = document.createElement('tr');
  trow.className = 'title-row';
  trow.dataset.secId = secId;
  trow.dataset.entryIdx = ei;

  // Cat cell (rowspan 2)
  const catTd = document.createElement('td');
  catTd.className = 'cat-cell';
  catTd.rowSpan = 2;
  const catDiv = makeEditable('분류');
  catDiv.style.textAlign = 'center';
  catDiv.textContent = entry.cat || '';
  catTd.appendChild(catDiv);

  // Delete entry button
  const delEntBtn = document.createElement('button');
  delEntBtn.textContent = '✕';
  delEntBtn.title = '행 삭제';
  delEntBtn.style.cssText = 'font-size:8px;padding:0 2px;cursor:pointer;background:#fdd;border:1px solid #ccc;border-radius:2px;display:block;margin:2px auto 0;';
  delEntBtn.onclick = () => deleteEntry(trow);
  catTd.appendChild(delEntBtn);
  trow.appendChild(catTd);

  // 제목: label
  const lbl1 = document.createElement('td');
  lbl1.className = 'lbl';
  lbl1.textContent = '제목:';
  trow.appendChild(lbl1);

  // Main title cell
  const mainTd = document.createElement('td');
  const mainDiv = makeEditable('제목 입력');
  mainDiv.className = 'main-text';
  mainDiv.textContent = entry.title || '';
  mainTd.appendChild(mainDiv);
  trow.appendChild(mainTd);

  // Right 제목: label
  const rlbl1 = document.createElement('td');
  rlbl1.className = 'rlbl';
  rlbl1.textContent = '제목:';
  trow.appendChild(rlbl1);

  // Right title
  const rtitleTd = document.createElement('td');
  const rtitleDiv = makeEditable('댓글 제목');
  rtitleDiv.className = 'comment-text';
  rtitleDiv.textContent = entry.rtitle || '';
  rtitleTd.appendChild(rtitleDiv);
  trow.appendChild(rtitleTd);

  // 댓글1
  const c1td = document.createElement('td');
  c1td.className = 'comment-cell';
  const c1div = makeEditable('댓글1');
  c1div.className = 'comment-text';
  c1div.textContent = entry.c1 || '';
  c1td.appendChild(c1div);
  trow.appendChild(c1td);

  // 댓글2
  const c2td = document.createElement('td');
  c2td.className = 'comment-cell';
  const c2div = makeEditable('댓글2');
  c2div.className = 'comment-text';
  c2div.textContent = entry.c2 || '';
  c2td.appendChild(c2div);
  trow.appendChild(c2td);

  // 댓글3
  const c3td = document.createElement('td');
  c3td.className = 'comment-cell';
  const c3div = makeEditable('댓글3');
  c3div.className = 'comment-text';
  c3div.textContent = entry.c3 || '';
  c3td.appendChild(c3div);
  trow.appendChild(c3td);

  // Link/date cell (rowspan 2)
  const linkTd = document.createElement('td');
  linkTd.className = 'link-cell';
  linkTd.rowSpan = 2;
  const dateDiv = makeEditable('날짜');
  dateDiv.className = 'date-text';
  dateDiv.textContent = entry.date || '';
  linkTd.appendChild(dateDiv);
  const linkDiv = makeEditable('링크');
  linkDiv.style.fontSize = '9px';
  linkDiv.textContent = entry.link || '';
  linkTd.appendChild(linkDiv);
  trow.appendChild(linkTd);

  // ── Content row ──
  const crow = document.createElement('tr');
  crow.className = 'content-row';
  crow.dataset.secId = secId;
  crow.dataset.entryIdx = ei;

  // 내용: label
  const lbl2 = document.createElement('td');
  lbl2.className = 'lbl';
  lbl2.textContent = '내용:';
  crow.appendChild(lbl2);

  // Main body
  const bodyTd = document.createElement('td');
  const bodyDiv = makeEditable('내용 입력');
  bodyDiv.className = 'main-text';
  bodyDiv.textContent = entry.body || '';
  bodyTd.appendChild(bodyDiv);
  crow.appendChild(bodyTd);

  // Right 내용: label
  const rlbl2 = document.createElement('td');
  rlbl2.className = 'rlbl';
  rlbl2.textContent = '내용:';
  crow.appendChild(rlbl2);

  // Right body
  const rbodyTd = document.createElement('td');
  const rbodyDiv = makeEditable('댓글 내용');
  rbodyDiv.className = 'main-text';
  rbodyDiv.textContent = entry.rbody || '';
  rbodyTd.appendChild(rbodyDiv);
  crow.appendChild(rbodyTd);

  // Empty cells for comments (already in title row)
  ['','',''].forEach(() => {
    const td = document.createElement('td');
    td.style.background = '#fff';
    crow.appendChild(td);
  });

  // ── Separator row ──
  const srow = document.createElement('tr');
  srow.className = 'sep';
  for (let i = 0; i < 9; i++) {
    srow.appendChild(document.createElement('td'));
  }

  if (insertBefore) {
    tbody.insertBefore(trow, insertBefore);
    tbody.insertBefore(crow, insertBefore);
    tbody.insertBefore(srow, insertBefore);
  } else {
    tbody.appendChild(trow);
    tbody.appendChild(crow);
    tbody.appendChild(srow);
  }
}

function addEntry(secId) {
  const sec = sections.find(s => s.id === secId);
  if (!sec) return;
  const newEntry = { cat:'', title:'', body:'', rtitle:'', rbody:'', c1:'', c2:'', c3:'', link:'', date:'' };
  sec.entries.push(newEntry);
  renderEntry(secId, newEntry, sec.entries.length - 1);
}

function deleteEntry(titleRow) {
  if (!confirm('이 행을 삭제하시겠습니까?')) return;
  // titleRow, contentRow, sepRow
  const next1 = titleRow.nextSibling;
  const next2 = next1 ? next1.nextSibling : null;
  titleRow.remove();
  if (next1 && next1.classList && (next1.classList.contains('content-row') || next1.classList.contains('sep'))) next1.remove();
  if (next2 && next2.classList && next2.classList.contains('sep')) next2.remove();
}

function deleteSection(secId) {
  if (!confirm('이 섹션 전체를 삭제하시겠습니까?')) return;
  sections = sections.filter(s => s.id !== secId);
  rebuildTable();
}

function rebuildTable() {
  const tbody = document.getElementById('sheetBody');
  tbody.innerHTML = '';
  updateJumpSelect();
  sections.forEach((sec, i) => renderSection(sec, i));
}

function addSection() {
  const name = prompt('새 섹션 이름을 입력하세요:', '새 섹션');
  if (!name) return;
  const id = 'sec_' + Date.now();
  const newSec = { id, name, headerRight:'', tags:'', comment1h:'댓글1', comment2h:'댓글2', comment3h:'댓글3', metaHeader:'', entries:[
    { cat:'', title:'', body:'', rtitle:'', rbody:'', c1:'', c2:'', c3:'', link:'', date:'' }
  ]};
  sections.push(newSec);
  rebuildTable();
  document.getElementById(`section-${id}`).scrollIntoView({behavior:'smooth'});
}

function updateJumpSelect() {
  const sel = document.getElementById('jumpSelect');
  sel.innerHTML = '<option value="">-- 섹션 이동 --</option>';
  sections.forEach(sec => {
    const opt = document.createElement('option');
    opt.value = `section-${sec.id}`;
    opt.textContent = sec.name;
    sel.appendChild(opt);
  });
}

function jumpToSection(id) {
  if (!id) return;
  const el = document.getElementById(id);
  if (el) el.scrollIntoView({behavior:'smooth'});
}

// ─────────────────────────────────────────────
// Save / Load (localStorage)
// ─────────────────────────────────────────────
function gatherData() {
  // Collect current DOM state
  const result = [];
  sections.forEach(sec => {
    const sectionEl = document.getElementById(`section-${sec.id}`);
    const nameDiv = sectionEl ? sectionEl.querySelector('div[contenteditable]') : null;
    const metaTd = sectionEl ? sectionEl.querySelectorAll('td')[8] : null;
    const metaDiv = metaTd ? metaTd.querySelector('div[contenteditable]') : null;

    const entries = [];
    // Find all entry rows in DOM
    const allRows = document.querySelectorAll(`tr[data-sec-id="${sec.id}"]`);
    const titleRows = [...allRows].filter(r => r.classList.contains('title-row'));
    titleRows.forEach(trow => {
      const divs = trow.querySelectorAll('[contenteditable]');
      const crow = trow.nextSibling;
      const cdivs = crow ? crow.querySelectorAll('[contenteditable]') : [];
      entries.push({
        cat: divs[0]?.textContent || '',
        title: divs[1]?.textContent || '',
        rtitle: divs[2]?.textContent || '',
        c1: divs[3]?.textContent || '',
        c2: divs[4]?.textContent || '',
        c3: divs[5]?.textContent || '',
        date: divs[6]?.textContent || '',
        link: divs[7]?.textContent || '',
        body: cdivs[0]?.textContent || '',
        rbody: cdivs[1]?.textContent || '',
      });
    });

    result.push({
      id: sec.id,
      name: nameDiv?.textContent || sec.name,
      tags: sec.tags,
      metaHeader: metaDiv?.textContent || sec.metaHeader,
      comment1h: sec.comment1h, comment2h: sec.comment2h, comment3h: sec.comment3h,
      entries
    });
  });
  return result;
}

function saveToLocal() {
  const data = gatherData();
  localStorage.setItem('snsSheet_v1', JSON.stringify(data));
  const badge = document.getElementById('savedBadge');
  badge.style.display = 'inline';
  setTimeout(() => badge.style.display = 'none', 2000);
}

function loadFromLocal() {
  const raw = localStorage.getItem('snsSheet_v1');
  if (!raw) { alert('저장된 데이터가 없습니다.'); return; }
  if (!confirm('저장된 데이터를 불러오면 현재 내용이 사라집니다. 계속할까요?')) return;
  sections = JSON.parse(raw);
  rebuildTable();
}

// ─────────────────────────────────────────────
// CSV Export
// ─────────────────────────────────────────────
function exportCSV() {
  const data = gatherData();
  let csv = '﻿'; // BOM for Korean
  csv += '섹션,분류,제목,내용,댓글제목,댓글내용,댓글1,댓글2,댓글3,날짜,링크\n';
  data.forEach(sec => {
    sec.entries.forEach(e => {
      const row = [sec.name, e.cat, e.title, e.body, e.rtitle, e.rbody, e.c1, e.c2, e.c3, e.date, e.link];
      csv += row.map(v => `"${(v||'').replace(/"/g,'""')}"`).join(',') + '\n';
    });
  });
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'sns_sheet.csv'; a.click();
  URL.revokeObjectURL(url);
}

// ─────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────
sections = JSON.parse(JSON.stringify(defaultSections));
updateJumpSelect();
sections.forEach((sec, i) => renderSection(sec, i));

// Auto-save on focus out
document.addEventListener('focusout', () => {
  localStorage.setItem('snsSheet_v1_auto', JSON.stringify(gatherData()));
});

// Load autosave if exists
window.addEventListener('load', () => {
  const auto = localStorage.getItem('snsSheet_v1_auto');
  if (auto) {
    try {
      const parsed = JSON.parse(auto);
      if (parsed && parsed.length > 0) {
        sections = parsed;
        document.getElementById('sheetBody').innerHTML = '';
        updateJumpSelect();
        sections.forEach((sec,i) => renderSection(sec, i));
      }
    } catch(e) {}
  }
});
</script>
