<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNS 수집 시트</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: '맑은 고딕', 'Malgun Gothic', sans-serif;
    font-size: 11px; background: #fff;
    display: flex; flex-direction: column; height: 100vh;
  }

  /* ── 상단 툴바 ── */
  .toolbar {
    position: sticky; top: 0; z-index: 100;
    background: #f0f0f0; border-bottom: 1px solid #ccc;
    padding: 5px 10px; display: flex; gap: 6px; align-items: center; flex-wrap: wrap;
    flex-shrink: 0;
  }
  .toolbar button {
    padding: 3px 9px; font-size: 11px; cursor: pointer;
    border: 1px solid #999; border-radius: 3px; background: #fff;
  }
  .toolbar button:hover { background: #e0e0e0; }
  .toolbar .title { font-weight: bold; font-size: 13px; margin-right: 6px; }
  .toolbar select { font-size: 11px; padding: 2px 5px; border: 1px solid #999; border-radius: 3px; }
  .saved-badge { display: none; color: green; font-size: 10px; }

  /* ── 시트 영역 ── */
  .sheet-wrap { overflow: auto; flex: 1; padding: 10px 10px 4px; }

  table { border-collapse: collapse; min-width: 1400px; table-layout: fixed; }
  col.col-cat   { width: 70px; }
  col.col-label { width: 40px; }
  col.col-main  { width: 320px; }
  col.col-rlabel{ width: 40px; }
  col.col-r1    { width: 200px; }
  col.col-c1    { width: 130px; }
  col.col-c2    { width: 130px; }
  col.col-c3    { width: 130px; }
  col.col-meta  { width: 280px; }

  td { border: 1px solid #bbb; vertical-align: top; padding: 0; }

  tr.section-header td {
    background: #ff0000; color: #fff; font-weight: bold;
    font-size: 11px; padding: 3px 5px; vertical-align: middle;
  }
  tr.sep td { height: 6px; background: #f5deb3; border-color: #ccc; }

  tr.title-row td.cat-cell, tr.content-row td.cat-cell {
    background: #f2dce4; font-size: 10px; font-weight: bold;
    text-align: center; vertical-align: middle; padding: 2px; word-break: keep-all;
  }
  tr.title-row td.lbl, tr.content-row td.lbl {
    background: #f2dce4; font-size: 10px; color: #555;
    padding: 2px 3px; vertical-align: top; white-space: nowrap;
  }
  td.rlbl {
    background: #fff; font-size: 10px; color: #555;
    padding: 2px 3px; vertical-align: top; white-space: nowrap;
  }
  td.comment-cell, td.link-cell { background: #fff; vertical-align: top; }
  td.link-cell { font-size: 9px; color: #555; padding: 2px 3px; word-break: break-all; }

  [contenteditable="true"] {
    outline: none; min-height: 18px; width: 100%; display: block;
    padding: 3px 4px; font-size: 11px; line-height: 1.5;
    white-space: pre-wrap; word-break: break-all;
  }
  [contenteditable="true"]:focus { background: #fffde7; box-shadow: inset 0 0 0 2px #ffc107; }
  [contenteditable="true"]:empty:before { content: attr(data-ph); color: #ccc; pointer-events: none; }
  .main-text { min-height: 70px; }
  .comment-text { min-height: 40px; }
  .date-text { min-height: 18px; font-size: 10px; color: #666; }

  tr.add-row td { background: #f9f9f9; text-align: center; padding: 4px; }
  tr.add-row button {
    font-size: 10px; padding: 2px 8px; cursor: pointer;
    border: 1px dashed #999; background: #fff; border-radius: 3px;
  }
  tr.add-row button:hover { background: #e8f5e9; }

  /* ── 하단 탭 바 ── */
  .tab-bar {
    display: flex; align-items: stretch;
    background: #f1f3f4; border-top: 2px solid #e0e0e0;
    min-height: 34px; flex-shrink: 0;
    overflow-x: auto; overflow-y: hidden;
    user-select: none;

  .tab-bar::-webkit-scrollbar { height: 4px; }
  .tab-bar::-webkit-scrollbar-thumb { background: #ccc; border-radius: 2px; }

  .tab-actions {
    display: flex; align-items: center; gap: 2px;
    padding: 0 6px; border-right: 1px solid #ddd; flex-shrink: 0;
  }
  .tab-actions button {
    width: 26px; height: 26px; border: 1px solid #ccc; border-radius: 3px;
    background: #fff; cursor: pointer; font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    color: #444;
  }
  .tab-actions button:hover { background: #e8f0fe; }

  .tabs-list { display: flex; align-items: stretch; }

  .tab {
    display: flex; align-items: center; gap: 4px;
    padding: 0 14px; border-right: 1px solid #ddd;
    cursor: pointer; white-space: nowrap; font-size: 12px;
    color: #444; position: relative; min-width: 80px;
    background: #f1f3f4; transition: background 0.1s;
  }
  .tab:hover { background: #e8eaed; }
  .tab.active {
    background: #fff; color: #1a73e8; font-weight: bold;
    border-top: 2px solid #c0392b; margin-top: -2px;
    border-bottom: 1px solid #fff;
  }

  .tab .tab-name[contenteditable="true"]:focus { background: #e8f0fe; border-radius: 2px; }

    background: transparent; border: none; cursor: pointer;
    font-size: 10px; color: #888; display: flex; align-items: center; justify-content: center;
    opacity: 0;
  }
  .tab:hover .tab-del, .tab.active .tab-del { opacity: 1; }
  .tab .tab-del:hover { background: #f28b82; color: #fff; }

  @media print {
    .toolbar, .tab-bar { display: none; }
    [contenteditable] { border: none !important; box-shadow: none !important; }
  }
</style>

let tabs = [];        // [{ id, name, sections }]
let activeTabId = '';

function todayLabel() {
  const d = new Date();
  return `${d.getMonth()+1}/${d.getDate()}`;
}

function makeTabId() { return 'tab_' + Date.now() + '_' + Math.random().toString(36).slice(2,6); }

function initTabs() {
  const saved = localStorage.getItem('snsSheet_tabs_v2');
  if (saved) {
    try {
      const parsed = JSON.parse(saved);
      if (parsed && parsed.tabs && parsed.tabs.length > 0) {
        tabs = parsed.tabs;
        activeTabId = parsed.activeTabId || tabs[0].id;
        renderTabBar();
        switchTab(activeTabId, false);
        return;
      }
    } catch(e) {}
  }
  // 기본값: 샘플 탭 하나
  const firstId = makeTabId();
  tabs = [{ id: firstId, name: '샘플', sections: JSON.parse(JSON.stringify(defaultSections)) }];
  activeTabId = firstId;
  renderTabBar();
  switchTab(activeTabId, false);
}

  localStorage.setItem('snsSheet_tabs_v2', JSON.stringify({ tabs, activeTabId }));
  const badge = document.getElementById('savedBadge');
  badge.style.display = 'inline';
  setTimeout(() => badge.style.display = 'none', 2000);
}

// 현재 DOM → 현재 탭 데이터 동기화
function collectCurrentTab() {
  const tab = tabs.find(t => t.id === activeTabId);
  if (!tab) return;
  tab.sections = gatherSections();
}

// ═══════════════════════════════════════════════
// 탭 바 렌더
// ═══════════════════════════════════════════════
function renderTabBar() {
  const list = document.getElementById('tabsList');
  list.innerHTML = '';
  tabs.forEach(tab => {
    const el = document.createElement('div');
    el.className = 'tab' + (tab.id === activeTabId ? ' active' : '');
    el.dataset.tabId = tab.id;

    const nameSpan = document.createElement('span');
    nameSpan.className = 'tab-name';
    nameSpan.textContent = tab.name;
    // 더블클릭으로 이름 편집
    nameSpan.addEventListener('dblclick', e => {
      e.stopPropagation();
      nameSpan.contentEditable = 'true';
      nameSpan.focus();
      const range = document.createRange();
      range.selectNodeContents(nameSpan);
      window.getSelection().removeAllRanges();
      window.getSelection().addRange(range);
    });
    nameSpan.addEventListener('blur', () => {
      nameSpan.contentEditable = 'false';
      tab.name = nameSpan.textContent.trim() || tab.name;
      saveAll();
    });
    nameSpan.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); nameSpan.blur(); }
    });

    const delBtn = document.createElement('button');
    delBtn.className = 'tab-del';
    delBtn.textContent = '✕';
    delBtn.title = '탭 삭제';
    delBtn.addEventListener('click', e => { e.stopPropagation(); deleteTab(tab.id); });

    el.appendChild(nameSpan);
    el.appendChild(delBtn);
    el.addEventListener('click', () => switchTab(tab.id));
    list.appendChild(el);
  });
}

function switchTab(tabId, doCollect = true) {
  if (doCollect && activeTabId) collectCurrentTab();
  activeTabId = tabId;
  const tab = tabs.find(t => t.id === tabId);
  if (!tab) return;
  renderTabBar();
  loadSections(tab.sections);
}

function addTab() {
  collectCurrentTab();
  const label = todayLabel();
  // 이미 같은 이름 있으면 번호 붙이기
  let name = label;
  let cnt = 2;
  while (tabs.find(t => t.name === name)) { name = `${label}(${cnt++})`; }
  const id = makeTabId();
  tabs.push({ id, name, sections: JSON.parse(JSON.stringify(defaultSections)) });
  activeTabId = id;
  renderTabBar();
  loadSections(tabs.find(t=>t.id===id).sections);
  saveAll();
}

function copyTab() {
  collectCurrentTab();
  const src = tabs.find(t => t.id === activeTabId);
  if (!src) return;
  const id = makeTabId();
  const name = src.name + ' 사본';
  tabs.push({ id, name, sections: JSON.parse(JSON.stringify(src.sections)) });
  activeTabId = id;
  renderTabBar();
  loadSections(tabs.find(t=>t.id===id).sections);
  saveAll();
}

function deleteTab(tabId) {
  if (tabs.length <= 1) { alert('마지막 탭은 삭제할 수 없습니다.'); return; }
  if (!confirm('이 탭을 삭제하시겠습니까?')) return;
  const idx = tabs.findIndex(t => t.id === tabId);
  tabs.splice(idx, 1);
  if (activeTabId === tabId) {
    activeTabId = tabs[Math.max(0, idx-1)].id;
  }
  renderTabBar();
  switchTab(activeTabId, false);
  saveAll();
}

// ═══════════════════════════════════════════════
// 시트 렌더
// ═══════════════════════════════════════════════
let sections = [];

function loadSections(data) {
  sections = JSON.parse(JSON.stringify(data));
  const tbody = document.getElementById('sheetBody');
  tbody.innerHTML = '';
  updateJumpSelect();
  sections.forEach((sec, i) => renderSection(sec, i));
}

function makeEditable(ph='') {
  const div = document.createElement('div');
  div.contentEditable = 'true';
  div.setAttribute('data-ph', ph);
  div.spellcheck = false;
  return div;
}

function renderSection(sec) {
  const tbody = document.getElementById('sheetBody');
  const sectionId = `section-${sec.id}`;

  const hrow = document.createElement('tr');
  hrow.className = 'section-header';
  hrow.id = sectionId;

  const nameCell = document.createElement('td');
  nameCell.colSpan = 3;
  nameCell.style.cssText = 'background:#ff0000;color:#fff;font-weight:bold;';
  const nameDiv = makeEditable('섹션명');
  nameDiv.style.color = '#fff';
  nameDiv.textContent = sec.name;
  nameCell.appendChild(nameDiv);
  if (sec.tags) {
    const tagDiv = document.createElement('div');
    tagDiv.style.cssText = 'font-size:9px;margin-top:3px;opacity:0.9;color:#fff;';
    tagDiv.textContent = sec.tags;
    nameCell.appendChild(tagDiv);
  }
  hrow.appendChild(nameCell);

  const emptyHdr = document.createElement('td');
  emptyHdr.colSpan = 2; emptyHdr.style.background = '#ff0000';
  hrow.appendChild(emptyHdr);

  ['댓글1','댓글2','댓글3'].forEach(lbl => {
    const c = document.createElement('td');
    c.style.cssText = 'background:#ff0000;color:#fff;font-weight:bold;text-align:center;vertical-align:middle;';
    c.textContent = lbl; hrow.appendChild(c);
  });

  const metaCell = document.createElement('td');
  metaCell.style.background = '#ff0000';
  const metaDiv = makeEditable('메타/링크');
  metaDiv.style.cssText = 'font-size:9px;color:#fff;';
  metaDiv.textContent = sec.metaHeader || '';
  metaCell.appendChild(metaDiv);

  const btnDiv = document.createElement('div');
  btnDiv.style.marginTop = '4px';
  const addBtn = document.createElement('button');
  addBtn.textContent = '+ 행 추가';
  addBtn.style.cssText = 'font-size:9px;padding:1px 5px;cursor:pointer;background:#fff;color:#333;border:1px solid #ccc;border-radius:2px;margin-right:3px;';
  addBtn.onclick = () => addEntry(sec.id);
  const delBtn = document.createElement('button');
  delBtn.textContent = '섹션 삭제';
  delBtn.style.cssText = 'font-size:9px;padding:1px 5px;cursor:pointer;background:#fdd;color:#900;border:1px solid #ccc;border-radius:2px;';
  delBtn.onclick = () => deleteSection(sec.id);
  btnDiv.appendChild(addBtn); btnDiv.appendChild(delBtn);
  metaCell.appendChild(btnDiv);
  hrow.appendChild(metaCell);
  tbody.appendChild(hrow);

  sec.entries.forEach((entry, ei) => renderEntry(sec.id, entry, ei));

  const addRow = document.createElement('tr');
  addRow.className = 'add-row'; addRow.id = `add-row-${sec.id}`;
  const addTd = document.createElement('td'); addTd.colSpan = 9;
  const ab = document.createElement('button');
  ab.textContent = `+ "${sec.name}" 에 행 추가`;
  ab.onclick = () => addEntry(sec.id);
  addTd.appendChild(ab); addRow.appendChild(addTd);
  tbody.appendChild(addRow);
}

function renderEntry(secId, entry, ei) {
  const tbody = document.getElementById('sheetBody');
  const insertBefore = document.getElementById(`add-row-${secId}`) || null;

  const trow = document.createElement('tr');
  trow.className = 'title-row';
  trow.dataset.secId = secId; trow.dataset.entryIdx = ei;

  const catTd = document.createElement('td');
  catTd.className = 'cat-cell'; catTd.rowSpan = 2;
  const catDiv = makeEditable('분류');
  catDiv.style.textAlign = 'center'; catDiv.textContent = entry.cat || '';
  catTd.appendChild(catDiv);
  const delBtn = document.createElement('button');
  delBtn.textContent = '✕'; delBtn.title = '행 삭제';
  delBtn.style.cssText = 'font-size:8px;padding:0 2px;cursor:pointer;background:#fdd;border:1px solid #ccc;border-radius:2px;display:block;margin:2px auto 0;';
  delBtn.onclick = () => deleteEntry(trow);
  catTd.appendChild(delBtn);
  trow.appendChild(catTd);

  const lbl1 = document.createElement('td'); lbl1.className = 'lbl'; lbl1.textContent = '제목:';
  trow.appendChild(lbl1);

  const mainTd = document.createElement('td');
  const mainDiv = makeEditable('제목 입력'); mainDiv.className = 'main-text';
  mainDiv.textContent = entry.title || ''; mainTd.appendChild(mainDiv);
  trow.appendChild(mainTd);

  const rlbl1 = document.createElement('td'); rlbl1.className = 'rlbl'; rlbl1.textContent = '제목:';
  trow.appendChild(rlbl1);

  const rtitleTd = document.createElement('td');
  const rtitleDiv = makeEditable('댓글 제목'); rtitleDiv.className = 'comment-text';
  rtitleDiv.textContent = entry.rtitle || ''; rtitleTd.appendChild(rtitleDiv);
  trow.appendChild(rtitleTd);

  ['c1','c2','c3'].forEach(key => {
    const td = document.createElement('td'); td.className = 'comment-cell';
    const d = makeEditable('댓글'); d.className = 'comment-text';
    d.textContent = entry[key] || ''; td.appendChild(d); trow.appendChild(td);
  });

  const linkTd = document.createElement('td');
  linkTd.className = 'link-cell'; linkTd.rowSpan = 2;
  const dateDiv = makeEditable('날짜'); dateDiv.className = 'date-text';
  dateDiv.textContent = entry.date || ''; linkTd.appendChild(dateDiv);
  const linkDiv = makeEditable('링크'); linkDiv.style.fontSize = '9px';
  linkDiv.textContent = entry.link || ''; linkTd.appendChild(linkDiv);
  trow.appendChild(linkTd);

  const crow = document.createElement('tr');
  crow.className = 'content-row';
  crow.dataset.secId = secId; crow.dataset.entryIdx = ei;

  const lbl2 = document.createElement('td'); lbl2.className = 'lbl'; lbl2.textContent = '내용:';
  crow.appendChild(lbl2);

  const bodyTd = document.createElement('td');
  const bodyDiv = makeEditable('내용 입력'); bodyDiv.className = 'main-text';
  bodyDiv.textContent = entry.body || ''; bodyTd.appendChild(bodyDiv);
  crow.appendChild(bodyTd);

  const rlbl2 = document.createElement('td'); rlbl2.className = 'rlbl'; rlbl2.textContent = '내용:';
  crow.appendChild(rlbl2);

  const rbodyTd = document.createElement('td');
  const rbodyDiv = makeEditable('댓글 내용'); rbodyDiv.className = 'main-text';
  rbodyDiv.textContent = entry.rbody || ''; rbodyTd.appendChild(rbodyDiv);
  crow.appendChild(rbodyTd);

  for (let i=0;i<3;i++) {
    const td = document.createElement('td'); td.style.background='#fff'; crow.appendChild(td);
  }

  const srow = document.createElement('tr'); srow.className = 'sep';
  for (let i=0;i<9;i++) srow.appendChild(document.createElement('td'));

  if (insertBefore) {
    tbody.insertBefore(trow, insertBefore);
    tbody.insertBefore(crow, insertBefore);
    tbody.insertBefore(srow, insertBefore);
  } else {
    tbody.appendChild(trow); tbody.appendChild(crow); tbody.appendChild(srow);
  }
}

function addEntry(secId) {
  const sec = sections.find(s => s.id === secId); if (!sec) return;
  const e = { cat:'', title:'', body:'', rtitle:'', rbody:'', c1:'', c2:'', c3:'', link:'', date:'' };
  sec.entries.push(e);
  renderEntry(secId, e, sec.entries.length - 1);
}

function deleteEntry(titleRow) {
  if (!confirm('이 행을 삭제하시겠습니까?')) return;
  const n1 = titleRow.nextSibling, n2 = n1?.nextSibling;
  titleRow.remove();
  if (n1?.classList?.contains('content-row') || n1?.classList?.contains('sep')) n1.remove();
  if (n2?.classList?.contains('sep')) n2.remove();
}

function deleteSection(secId) {
  if (!confirm('이 섹션 전체를 삭제하시겠습니까?')) return;
  sections = sections.filter(s => s.id !== secId);
  document.getElementById('sheetBody').innerHTML = '';
  updateJumpSelect();
  sections.forEach(sec => renderSection(sec));
  // add-row 재생성
  sections.forEach(sec => {
    if (!document.getElementById(`add-row-${sec.id}`)) {
      const addRow = document.createElement('tr');
      addRow.className = 'add-row'; addRow.id = `add-row-${sec.id}`;
      const td = document.createElement('td'); td.colSpan = 9;
      const btn = document.createElement('button');
      btn.textContent = `+ "${sec.name}" 에 행 추가`;
      btn.onclick = () => addEntry(sec.id);
      td.appendChild(btn); addRow.appendChild(td);
      document.getElementById('sheetBody').appendChild(addRow);
    }
  });
}

function addSection() {
  const name = prompt('새 섹션 이름:', '새 섹션'); if (!name) return;
  const id = 'sec_' + Date.now();
  const newSec = { id, name, tags:'', metaHeader:'', entries:[
    { cat:'', title:'', body:'', rtitle:'', rbody:'', c1:'', c2:'', c3:'', link:'', date:'' }
  ]};
  sections.push(newSec);
  renderSection(newSec);
  document.getElementById(`section-${id}`)?.scrollIntoView({behavior:'smooth'});
}

function updateJumpSelect() {
  const sel = document.getElementById('jumpSelect');
  sel.innerHTML = '<option value="">-- 섹션 이동 --</option>';
  sections.forEach(sec => {
    const opt = document.createElement('option');
    opt.value = `section-${sec.id}`; opt.textContent = sec.name;
    sel.appendChild(opt);
  });
}

function jumpToSection(id) {
  if (!id) return;
  document.getElementById(id)?.scrollIntoView({behavior:'smooth'});
}

// ═══════════════════════════════════════════════
// DOM → 데이터 수집
// ═══════════════════════════════════════════════
function gatherSections() {
  const result = [];
  sections.forEach(sec => {
    const hrow = document.getElementById(`section-${sec.id}`);
    const nameDiv = hrow?.querySelector('div[contenteditable]');
    const metaTds = hrow?.querySelectorAll('td');
    const metaDiv = metaTds ? metaTds[metaTds.length-1]?.querySelector('div[contenteditable]') : null;

    const entries = [];
    const titleRows = [...document.querySelectorAll(`tr.title-row[data-sec-id="${sec.id}"]`)];
    titleRows.forEach(trow => {
      const ds = [...trow.querySelectorAll('[contenteditable]')];
      const crow = trow.nextSibling;
      const cs = crow ? [...crow.querySelectorAll('[contenteditable]')] : [];
      entries.push({
        cat:   ds[0]?.textContent||'',
        title: ds[1]?.textContent||'',
        rtitle:ds[2]?.textContent||'',
        c1:    ds[3]?.textContent||'',
        c2:    ds[4]?.textContent||'',
        c3:    ds[5]?.textContent||'',
        date:  ds[6]?.textContent||'',
        link:  ds[7]?.textContent||'',
        body:  cs[0]?.textContent||'',
        rbody: cs[1]?.textContent||'',
      });
    });

    result.push({
      id: sec.id,
      name: nameDiv?.textContent || sec.name,
      tags: sec.tags || '',
      metaHeader: metaDiv?.textContent || sec.metaHeader || '',
      entries
    });
  });
  return result;
}

// CSV
function exportCSV() {
  collectCurrentTab();
  const tab = tabs.find(t=>t.id===activeTabId);
  if (!tab) return;
  let csv = '﻿탭,섹션,분류,제목,내용,댓글제목,댓글내용,댓글1,댓글2,댓글3,날짜,링크\n';
  tab.sections.forEach(sec => {
    sec.entries.forEach(e => {
      const row = [tab.name, sec.name, e.cat, e.title, e.body, e.rtitle, e.rbody, e.c1, e.c2, e.c3, e.date, e.link];
      csv += row.map(v=>`"${(v||'').replace(/"/g,'""')}"`).join(',') + '\n';
    });
  });
  const blob = new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='sns_sheet.csv'; a.click();
  URL.revokeObjectURL(url);
}

// 자동저장
document.addEventListener('focusout', () => {
  collectCurrentTab();
  localStorage.setItem('snsSheet_tabs_v2', JSON.stringify({ tabs, activeTabId }));
});

// ─── 초기화 ───
initTabs();
</script>
