<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNS 수집 시트</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: '맑은 고딕', 'Malgun Gothic', sans-serif;
    font-size: 11px; background: #fff;
    display: flex; flex-direction: column; height: 100vh; overflow: hidden;
  }

  /* ── 상단 툴바 ── */
  .toolbar {
    position: sticky; top: 0; z-index: 100;
    background: #f0f0f0; border-bottom: 1px solid #ccc;
    padding: 4px 6px; display: flex; gap: 5px; align-items: center; flex-wrap: wrap;
    flex-shrink: 0;
  }
  .toolbar button {
    padding: 3px 9px; font-size: 11px; cursor: pointer;
    border: 1px solid #999; border-radius: 3px; background: #fff;
  }
  .toolbar button:hover { background: #e0e0e0; }
  .toolbar .title { font-weight: bold; font-size: 13px; margin-right: 6px; }
  .toolbar select { font-size: 11px; padding: 2px 5px; border: 1px solid #999; border-radius: 3px; }
  .saved-badge { display: none; color: green; font-size: 10px; }
  .cloud-badge { display: none; font-size: 10px; }
  .cloud-badge.ok  { color: #1a73e8; }
  .cloud-badge.err { color: #c00; }

  /* ── 서식 도구 바 ── */
  .fmt-bar {
    background: #f5f5f5; border-bottom: 1px solid #ddd;
    padding: 3px 6px; display: flex; gap: 4px; align-items: center; flex-wrap: wrap;
    flex-shrink: 0;
  }
  .fmt-bar button {
    padding: 2px 7px; font-size: 11px; cursor: pointer;
    border: 1px solid #bbb; border-radius: 3px; background: #fff;
  }
  .fmt-bar button:hover { background: #e0e0e0; }
  .fmt-bar select { font-size: 11px; padding: 2px 4px; border: 1px solid #bbb; border-radius: 3px; }
  .fmt-bar label { font-size: 10px; color: #666; }
  .fmt-bar .fsep { display: inline-block; width: 1px; height: 16px; background: #ccc; margin: 0 2px; vertical-align: middle; }
  td.cell-focused  { background: #fffde7 !important; box-shadow: inset 0 0 0 2px #ffc107; }
  td.cell-selected { background: #e8f4fd !important; outline: 2px solid #64b5f6; outline-offset: -2px; }
  td.cell-va-mid   { vertical-align: middle !important; }
  td.cell-va-bot   { vertical-align: bottom !important; }
  td.cell-va-top   { vertical-align: top !important; }

  /* ── 동기화 패널 ── */
  .sync-panel {
    display: none; position: fixed; top: 50%; left: 50%; z-index: 9999;
    transform: translate(-50%, -50%);
    background: #fff; border: 1px solid #ccc; border-radius: 8px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2); padding: 20px 24px; width: 320px;
  }
  .sync-panel h3 { font-size: 14px; margin-bottom: 12px; color: #333; }
  .sync-panel p  { font-size: 11px; color: #666; margin-bottom: 10px; line-height: 1.6; }
  .sync-panel input {
    width: 100%; padding: 7px 10px; font-size: 14px; letter-spacing: 3px;
    border: 2px solid #ccc; border-radius: 5px; text-transform: uppercase;
    text-align: center; margin-bottom: 8px;
  }
  .sync-panel input:focus { border-color: #1a73e8; outline: none; }
  .sync-panel .sync-btns { display: flex; gap: 6px; }
  .sync-panel .sync-btns button {
    flex: 1; padding: 7px; font-size: 12px; cursor: pointer;
    border: 1px solid #ccc; border-radius: 5px; background: #f5f5f5;
  }
  .sync-panel .sync-btns button.primary {
    background: #1a73e8; color: #fff; border-color: #1a73e8;
  }
  .sync-panel .sync-btns button:hover { filter: brightness(0.95); }
  .sync-panel .sync-status { font-size: 11px; margin-top: 8px; min-height: 16px; text-align: center; }
  .sync-panel .sync-status.ok  { color: green; }
  .sync-panel .sync-status.err { color: #c00; }
  .sync-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 9998;
  }
  .sync-code-chip {
    font-size: 10px; background: #e8f0fe; color: #1a73e8;
    border: 1px solid #c5d8fb; border-radius: 10px; padding: 2px 8px; cursor: pointer;
  }

  /* ── 시트 영역 ── */
  .sheet-wrap { overflow-x: hidden; overflow-y: auto; flex: 1; padding: 4px 0 4px; }

  table { border-collapse: collapse; width: 100%; table-layout: fixed; }
  col.col-cat   { width: 5%; }
  col.col-label { width: 3%; }
  col.col-main  { width: 23%; }
  col.col-rlabel{ width: 3%; }
  col.col-r1    { width: 15%; }
  col.col-c1    { width: 11%; }
  col.col-c2    { width: 11%; }
  col.col-c3    { width: 11%; }
  col.col-date  { width: 7%; }
  col.col-link  { width: 11%; }

  td { border: 1px solid #bbb; vertical-align: top; padding: 0; overflow: visible; }

  tr.section-header td {
    background: #ff0000; color: #fff; font-weight: bold;
    font-size: 11px; padding: 3px 5px; vertical-align: middle;
  }
  tr.sep td { height: 6px; background: #f5deb3; border-color: #ccc; }

  tr.title-row td.cat-cell, tr.content-row td.cat-cell {
    background: #f2dce4; font-size: 10px; font-weight: bold;
    text-align: center; vertical-align: middle; padding: 2px; word-break: keep-all;
  }
  tr.title-row td.lbl, tr.content-row td.lbl {
    background: #f2dce4; font-size: 10px; color: #555;
    padding: 2px 3px; vertical-align: top; white-space: nowrap;
  }
  td.rlbl {
    background: #fff; font-size: 10px; color: #555;
    padding: 2px 3px; vertical-align: top; white-space: nowrap;
  }
  td.comment-cell, td.link-cell, td.date-cell { background: #fff; vertical-align: top; }
  td.link-cell { font-size: 9px; color: #555; padding: 2px 3px; word-break: break-all; }
  td.date-cell { font-size: 10px; color: #555; padding: 2px 3px; }

  [contenteditable="true"] {
    outline: none; min-height: 18px; width: 100%; display: block;
    padding: 3px 4px; font-size: 11px; line-height: 1.5;
    white-space: pre-wrap; word-break: break-word; overflow-wrap: break-word;
    overflow: visible; height: auto;
  }
  [contenteditable="true"]:focus { outline: none; }
  [contenteditable="true"]:empty:before { content: attr(data-ph); color: #ccc; pointer-events: none; }
  .main-text { min-height: 70px; height: auto; }
  .comment-text { min-height: 40px; height: auto; }
  .date-text { min-height: 18px; height: auto; font-size: 10px; color: #666; }
  .body-div { min-height: 60px; }

  tr.add-row td { background: #f9f9f9; text-align: center; padding: 4px; }
  tr.add-row button {
    font-size: 10px; padding: 2px 8px; cursor: pointer;
    border: 1px dashed #999; background: #fff; border-radius: 3px;
  }
  tr.add-row button:hover { background: #e8f5e9; }

  /* ── 하단 탭 바 ── */
  .tab-bar {
    display: flex; align-items: stretch;
    background: #f1f3f4; border-top: 2px solid #e0e0e0;
    min-height: 34px; flex-shrink: 0;
    overflow-x: auto; overflow-y: hidden;
    user-select: none;
  }
  .tab-bar::-webkit-scrollbar { height: 4px; }
  .tab-bar::-webkit-scrollbar-thumb { background: #ccc; border-radius: 2px; }

  .tab-actions {
    display: flex; align-items: center; gap: 2px;
    padding: 0 6px; border-right: 1px solid #ddd; flex-shrink: 0;
  }
  .tab-actions button {
    width: 26px; height: 26px; border: 1px solid #ccc; border-radius: 3px;
    background: #fff; cursor: pointer; font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    color: #444;
  }
  .tab-actions button:hover { background: #e8f0fe; }

  .tabs-list { display: flex; align-items: stretch; }

  .tab {
    display: flex; align-items: center; gap: 4px;
    padding: 0 14px; border-right: 1px solid #ddd;
    cursor: pointer; white-space: nowrap; font-size: 12px;
    color: #444; position: relative; min-width: 80px;
    background: #f1f3f4; transition: background 0.1s;
  }
  .tab:hover { background: #e8eaed; }
  .tab.active {
    background: #fff; color: #1a73e8; font-weight: bold;
    border-top: 2px solid #c0392b; margin-top: -2px;
    border-bottom: 1px solid #fff;
  }
  .tab .tab-name { flex: 1; }
  .tab .tab-name[contenteditable="true"] { outline: none; padding: 1px 2px; }
  .tab .tab-name[contenteditable="true"]:focus { background: #e8f0fe; border-radius: 2px; }
  .tab .tab-del {
    width: 16px; height: 16px; border-radius: 50%;
    background: transparent; border: none; cursor: pointer;
    font-size: 10px; color: #888; display: flex; align-items: center; justify-content: center;
    opacity: 0;
  }
  .tab:hover .tab-del, .tab.active .tab-del { opacity: 1; }
  .tab .tab-del:hover { background: #f28b82; color: #fff; }

  @media print {
    .toolbar, .tab-bar { display: none; }
    [contenteditable] { border: none !important; box-shadow: none !important; }
  }
</style>
</head>
<body>

<div class="toolbar">
  <span class="title">📋 SNS 수집 시트</span>
  <button onclick="addSection()">+ 섹션 추가</button>
  <button onclick="saveAll()">💾 저장</button>
  <button onclick="exportCSV()">📤 CSV</button>
  <button onclick="window.print()">🖨️ 인쇄</button>
  <button onclick="openSyncPanel()" style="background:#e8f0fe;border-color:#c5d8fb;color:#1a73e8;">☁ 기기 동기화</button>
  <span id="syncCodeChip" class="sync-code-chip" style="display:none" onclick="openSyncPanel()"></span>
  <select id="jumpSelect" onchange="jumpToSection(this.value)">
    <option value="">-- 섹션 이동 --</option>
  </select>
  <span class="saved-badge" id="savedBadge">✔ 자동저장됨</span>
  <span class="cloud-badge" id="cloudBadge"></span>
</div>

<div class="fmt-bar" id="fmtBar">
  <label>크기</label>
  <select id="fmtSize" onchange="applyFontSize(this.value)">
    <option value="">-</option>
    <option value="8">8</option><option value="9">9</option><option value="10">10</option>
    <option value="11">11</option><option value="12">12</option><option value="13">13</option>
    <option value="14">14</option><option value="16">16</option><option value="18">18</option>
    <option value="20">20</option><option value="24">24</option>
  </select>
  <label style="margin-left:3px">색상</label>
  <input type="color" id="fmtColor" value="#000000" title="글자 색상" oninput="applyFontColor(this.value)" onchange="applyFontColor(this.value)">
  <span class="fsep"></span>
  <button onmousedown="holdFocus(event)" onclick="applyHAlign('left')" title="왼쪽 정렬">≡왼</button>
  <button onmousedown="holdFocus(event)" onclick="applyHAlign('center')" title="가운데 정렬">≡중</button>
  <button onmousedown="holdFocus(event)" onclick="applyHAlign('right')" title="오른쪽 정렬">≡오</button>
  <span class="fsep"></span>
  <button onmousedown="holdFocus(event)" onclick="applyVAlign('top')" title="위 정렬">↑위</button>
  <button onmousedown="holdFocus(event)" onclick="applyVAlign('middle')" title="가운데 정렬">↕중</button>
  <button onmousedown="holdFocus(event)" onclick="applyVAlign('bottom')" title="아래 정렬">↓아</button>
</div>

<!-- 동기화 오버레이 & 패널 -->
<div class="sync-overlay" id="syncOverlay" onclick="closeSyncPanel()"></div>
<div class="sync-panel" id="syncPanel">
  <h3>☁ 기기 간 동기화</h3>
  <p>동기화 코드를 설정하면 어느 기기에서든<br>같은 코드로 작업 내용을 이어서 할 수 있습니다.</p>
  <input id="syncCodeInput" type="text" maxlength="16" placeholder="코드 입력 (예: MY-WORK-01)" />
  <div class="sync-btns">
    <button onclick="closeSyncPanel()">취소</button>
    <button class="primary" onclick="syncUpload()">☁ 업로드 (저장)</button>
    <button class="primary" style="background:#34a853;border-color:#34a853;" onclick="syncDownload()">⬇ 불러오기</button>
  </div>
  <div class="sync-status" id="syncStatus"></div>
</div>

<div class="sheet-wrap">
  <table id="mainTable">
    <colgroup>
      <col class="col-cat"><col class="col-label"><col class="col-main">
      <col class="col-rlabel"><col class="col-r1">
      <col class="col-c1"><col class="col-c2"><col class="col-c3">
      <col class="col-date"><col class="col-link">
    </colgroup>
    <tbody id="sheetBody"></tbody>
  </table>
</div>

<!-- 하단 탭 바 -->
<div class="tab-bar">
  <div class="tab-actions">
    <button onclick="addTab()" title="새 탭 추가">+</button>
    <button onclick="copyTab()" title="현재 탭 복사">⧉</button>
  </div>
  <div class="tabs-list" id="tabsList"></div>
</div>

<script>
// ═══════════════════════════════════════════════
// 구글 시트 붙여넣기 (TSV 파싱)
// ═══════════════════════════════════════════════
let pasteTargetSecId = null;

function setPasteTarget(secId) {
  pasteTargetSecId = secId;
  // 포커스된 셀이 있으면 blur (Ctrl+V가 셀로 가는 걸 방지)
  if (document.activeElement && document.activeElement.getAttribute('contenteditable') === 'true') {
    document.activeElement.blur();
  }
  // 모든 섹션 헤더 outline 초기화
  document.querySelectorAll('tr.section-header').forEach(r => {
    r.style.outline = '';
    r.style.outlineOffset = '';
  });
  // 선택된 섹션 강조
  const hrow = document.getElementById(`section-${secId}`);
  if (hrow) {
    hrow.style.outline = '3px solid #fbbc04';
    hrow.style.outlineOffset = '-3px';
  }
  const sec = sections.find(s => s.id === secId);
  showCloudBadge(`📋 "${sec?.name}" 섹션 선택됨 — Ctrl+V로 붙여넣기`, 'ok');
}

// 구글 시트에서 복사한 TSV 파싱
// 구조: 각 항목 = 2줄 (제목: 줄 + 내용: 줄)
// 컬럼: [제목:/내용:] [제목/내용] [댓글제목/댓글내용] [댓글1] [댓글2] [댓글3?] [날짜] [링크]
function parseTsvToEntries(text) {
  const rawRows = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').trimEnd().split('\n');
  const rows = rawRows.map(r => r.split('\t'));
  const entries = [];
  let i = 0;

  while (i < rows.length) {
    const r1 = rows[i];
    const r2 = rows[i + 1];

    // 첫 컬럼이 "제목:" 패턴인지 확인
    const label0 = (r1[0] || '').trim();
    const isLabelRow = label0 === '제목:' || label0 === '제목';

    let offset = isLabelRow ? 1 : 0; // 라벨 컬럼 건너뛸지 여부

    // 다음 줄이 "내용:" 패턴이면 쌍으로 처리
    const label2 = r2 ? (r2[0] || '').trim() : '';
    const hasPair = r2 && (label2 === '내용:' || label2 === '내용' || label2 === '');

    const get = (row, idx) => (row && row[idx] !== undefined ? row[idx].trim() : '');

    // 날짜 패턴 감지 (YYYY.MM.DD 형식)
    const isDate = v => /^\d{4}[.\-\/]\d{1,2}[.\-\/]\d{1,2}$/.test(v.trim());
    // URL 패턴 감지
    const isUrl  = v => /^https?:\/\//.test(v.trim());

    // 컬럼 값 추출
    const cols = r1.slice(offset);              // 라벨 이후 컬럼들
    const bcols = hasPair ? r2.slice(offset) : [];

    // 동적 매핑: 날짜/URL 컬럼 자동 감지
    let title='', rtitle='', c1='', c2='', c3='', date='', link='';
    let body='', rbody='';

    title  = get(r1, offset);
    rtitle = get(r1, offset + 1);
    c1     = get(r1, offset + 2);
    c2     = get(r1, offset + 3);

    // offset+4 이후: 날짜/링크/c3 자동 감지
    const rest = cols.slice(4);
    rest.forEach(v => {
      if (isUrl(v))       link = v.trim();
      else if (isDate(v)) date = v.trim();
      else if (!c3)       c3   = v.trim();
    });

    body  = get(r2, offset);
    rbody = get(r2, offset + 1);

    if (title || body) {
      entries.push({ cat:'', title, body, rtitle, rbody, c1, c2, c3, date, link });
    }

    i += (hasPair && r2) ? 2 : 1;
  }
  return entries;
}

// 전역 붙여넣기 이벤트 (구글 시트 TSV)
document.addEventListener('paste', (e) => {
  const text = e.clipboardData.getData('text/plain');
  if (!text.includes('\t')) return; // 탭 없으면 일반 텍스트 — 셀 처리에 맡김
  if (!pasteTargetSecId) return;   // 붙여넣기 대상 없으면 일반 처리

  // 붙여넣기 대상이 지정된 상태에서 탭 데이터 → 항상 가로채기
  e.preventDefault();

  if (!pasteTargetSecId) {
    alert('붙여넣기 위치를 먼저 선택해주세요.\n섹션 헤더(빨간 행)를 클릭하면 선택됩니다.');
    return;
  }

  const entries = parseTsvToEntries(text);
  if (!entries.length) { alert('붙여넣을 데이터가 없습니다.'); return; }

  const sec = sections.find(s => s.id === pasteTargetSecId);
  if (!sec) return;

  if (!confirm(`${entries.length}개 행을 "${sec.name}" 섹션에 추가할까요?`)) return;

  entries.forEach((entry, ei) => {
    sec.entries.push(entry);
    renderEntry(pasteTargetSecId, entry, sec.entries.length - 1);
  });

  autoSave();
  if (syncCode) {
    clearTimeout(_cloudTimer);
    _cloudTimer = setTimeout(async () => {
      try { await cloudSave(syncCode); showCloudBadge('☁ 클라우드 저장됨', 'ok'); }
      catch(e) { showCloudBadge('⚠ 클라우드 저장 실패', 'err'); }
    }, 1000);
  }

  showCloudBadge(`✔ ${entries.length}개 행 추가됨`, 'ok');
});

// ═══════════════════════════════════════════════
// 기본 섹션 데이터
// ═══════════════════════════════════════════════
const defaultSections = [];

// ═══════════════════════════════════════════════
// 탭 상태
// ═══════════════════════════════════════════════
let tabs = [];        // [{ id, name, sections }]
let activeTabId = '';

function todayLabel() {
  const d = new Date();
  return `${d.getMonth()+1}/${d.getDate()}`;
}

function makeTabId() { return 'tab_' + Date.now() + '_' + Math.random().toString(36).slice(2,6); }

function initTabs() { /* init()으로 대체됨 */ }

function saveAll() {
  autoSave();
}

// 현재 DOM → 현재 탭 데이터 동기화
function collectCurrentTab() {
  const tab = tabs.find(t => t.id === activeTabId);
  if (!tab) return;
  tab.sections = gatherSections();
}

// ═══════════════════════════════════════════════
// 탭 바 렌더
// ═══════════════════════════════════════════════
function renderTabBar() {
  const list = document.getElementById('tabsList');
  list.innerHTML = '';
  tabs.forEach(tab => {
    const el = document.createElement('div');
    el.className = 'tab' + (tab.id === activeTabId ? ' active' : '');
    el.dataset.tabId = tab.id;

    const nameSpan = document.createElement('span');
    nameSpan.className = 'tab-name';
    nameSpan.textContent = tab.name;
    // 더블클릭으로 이름 편집
    nameSpan.addEventListener('dblclick', e => {
      e.stopPropagation();
      nameSpan.contentEditable = 'true';
      nameSpan.focus();
      const range = document.createRange();
      range.selectNodeContents(nameSpan);
      window.getSelection().removeAllRanges();
      window.getSelection().addRange(range);
    });
    nameSpan.addEventListener('blur', () => {
      nameSpan.contentEditable = 'false';
      tab.name = nameSpan.textContent.trim() || tab.name;
      saveAll();
    });
    nameSpan.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); nameSpan.blur(); }
    });

    const delBtn = document.createElement('button');
    delBtn.className = 'tab-del';
    delBtn.textContent = '✕';
    delBtn.title = '탭 삭제';
    delBtn.addEventListener('click', e => { e.stopPropagation(); deleteTab(tab.id); });

    el.appendChild(nameSpan);
    el.appendChild(delBtn);
    el.addEventListener('click', () => switchTab(tab.id));
    list.appendChild(el);
  });
}

function switchTab(tabId, doCollect = true) {
  if (doCollect && activeTabId) collectCurrentTab();
  _undoStack = []; _redoStack = [];  // 탭별 이력 초기화
  activeTabId = tabId;
  const tab = tabs.find(t => t.id === tabId);
  if (!tab) return;
  renderTabBar();
  loadSections(tab.sections);
}

function addTab() {
  collectCurrentTab();
  const label = todayLabel();
  // 이미 같은 이름 있으면 번호 붙이기
  let name = label;
  let cnt = 2;
  while (tabs.find(t => t.name === name)) { name = `${label}(${cnt++})`; }
  const id = makeTabId();
  tabs.push({ id, name, sections: [] });
  activeTabId = id;
  renderTabBar();
  loadSections(tabs.find(t=>t.id===id).sections);
  saveAll();
}

function copyTab() {
  collectCurrentTab();
  const src = tabs.find(t => t.id === activeTabId);
  if (!src) return;
  const id = makeTabId();
  const name = src.name + ' 사본';
  tabs.push({ id, name, sections: JSON.parse(JSON.stringify(src.sections)) });
  activeTabId = id;
  renderTabBar();
  loadSections(tabs.find(t=>t.id===id).sections);
  saveAll();
}

function deleteTab(tabId) {
  if (tabs.length <= 1) { alert('마지막 탭은 삭제할 수 없습니다.'); return; }
  if (!confirm('이 탭을 삭제하시겠습니까?')) return;
  const idx = tabs.findIndex(t => t.id === tabId);
  tabs.splice(idx, 1);
  if (activeTabId === tabId) {
    activeTabId = tabs[Math.max(0, idx-1)].id;
  }
  renderTabBar();
  switchTab(activeTabId, false);
  saveAll();
}

let sections = [];

// ─── 서식 도구 ────────────────────────────────────────────────────────────────
let activeDiv = null;
let activeTd  = null;
let selectedCells = new Set();  // 선택된 td 목록 (엑셀 스타일)
let _pasteTargetTd = null;     // 붙여넣기 대상 셀

// ── 전역 Undo / Redo ──────────────────────────────────────────────────────────
const MAX_UNDO = 50;
let _undoStack = [];
let _redoStack = [];

function immediateUndoPush() {
  const snap = JSON.stringify(gatherSections());
  if (_undoStack.length > 0 && _undoStack[_undoStack.length - 1] === snap) return;
  _undoStack.push(snap);
  if (_undoStack.length > MAX_UNDO) _undoStack.shift();
  _redoStack = [];
}

function undoAction() {
  if (_undoStack.length === 0) return;
  _redoStack.push(JSON.stringify(gatherSections()));
  loadSections(JSON.parse(_undoStack.pop()));
  clearSelection(); activeDiv = null; activeTd = null;
  debouncedSave();
}

function redoAction() {
  if (_redoStack.length === 0) return;
  _undoStack.push(JSON.stringify(gatherSections()));
  loadSections(JSON.parse(_redoStack.pop()));
  clearSelection(); activeDiv = null; activeTd = null;
  debouncedSave();
}

function holdFocus(e) { e.preventDefault(); }

// 클립보드에 일반 텍스트 복사 (셀 선택 시 자동 복사용)
function copyToClipboard(text) {
  if (!text) return;
  try { if (navigator.clipboard?.writeText) { navigator.clipboard.writeText(text); return; } } catch(e) {}
  // Fallback (iframe 환경)
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:-200px;left:0;width:1px;height:1px;opacity:0;';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try { document.execCommand('copy'); } catch(e) {}
  document.body.removeChild(ta);
}

function applyFontSize(val) {
  if (!val) return;
  // 편집 중이면 activeDiv, 선택모드면 selectedCells
  const targets = document.activeElement?.isContentEditable && activeDiv
    ? [activeDiv]
    : [...selectedCells].map(td => td.querySelector('[contenteditable]')).filter(Boolean);
  targets.forEach(d => { d.style.fontSize = val + 'px'; });
  if (targets.length) debouncedSave();
}
function applyFontColor(val) {
  if (!activeDiv) return;
  activeDiv.style.color = val;
  debouncedSave();
}
function applyHAlign(align) {
  const targets = document.activeElement?.isContentEditable && activeDiv
    ? [activeDiv]
    : [...selectedCells].map(td => td.querySelector('[contenteditable]')).filter(Boolean);
  targets.forEach(d => { d.style.textAlign = align; });
  if (targets.length) debouncedSave();
}
function applyVAlign(align) {
  const tds = activeTd ? [activeTd] : [...selectedCells];
  tds.forEach(td => {
    td.classList.remove('cell-va-top', 'cell-va-mid', 'cell-va-bot');
    td.style.verticalAlign = '';
    if (align === 'top')    td.classList.add('cell-va-top');
    else if (align === 'middle') td.classList.add('cell-va-mid');
    else if (align === 'bottom') td.classList.add('cell-va-bot');
    td.dataset.va = align;
  });
  if (tds.length) debouncedSave();
}


function restoreVA(td, va) {
  if (!va) return;
  td.classList.remove('cell-va-top','cell-va-mid','cell-va-bot');
  if (va === 'top')    td.classList.add('cell-va-top');
  else if (va === 'middle') td.classList.add('cell-va-mid');
  else if (va === 'bottom') td.classList.add('cell-va-bot');
  td.dataset.va = va;
}

function loadSections(data) {
  sections = JSON.parse(JSON.stringify(data));
  const tbody = document.getElementById('sheetBody');
  tbody.innerHTML = '';
  updateJumpSelect();
  sections.forEach((sec, i) => renderSection(sec, i));
}

}

function renderEntry(secId, entry, ei) {

  trow.className = 'title-row';

  const crow = document.createElement('tr');

  const bodyTd = document.createElement('td');

  if (entry.bs) bodyDiv.setAttribute('style', entry.bs);
  if (entry.bva) restoreVA(bodyTd, entry.bva);

function addEntry(secId) {
  const sec = sections.find(s => s.id === secId); if (!sec) return;
  const e = { cat:'', title:'', body:'', rtitle:'', rbody:'', c1:'', c2:'', c3:'', link:'', date:'' };

  renderEntry(secId, e, sec.entries.length - 1);
}

function deleteEntry(titleRow) {
  if (!confirm('이 행을 삭제하시겠습니까?')) return;
  const n1 = titleRow.nextSibling, n2 = n1?.nextSibling;
  titleRow.remove();
  if (n1?.classList?.contains('content-row') || n1?.classList?.contains('sep')) n1.remove();
  if (n2?.classList?.contains('sep')) n2.remove();
}

function deleteSection(secId) {
  if (!confirm('이 섹션 전체를 삭제하시겠습니까?')) return;
  sections = sections.filter(s => s.id !== secId);
  document.getElementById('sheetBody').innerHTML = '';
  updateJumpSelect();
  sections.forEach(sec => renderSection(sec));

  sections.forEach(sec => {
    if (!document.getElementById(`add-row-${sec.id}`)) {
      const addRow = document.createElement('tr');

  });

// DOM → 데이터 수집
// ═══════════════════════════════════════════════
function gatherSections() {
  const result = [];
  sections.forEach(sec => {
    const hrow = document.getElementById(`section-${sec.id}`);
    const nameDiv = hrow?.querySelector('div[contenteditable]');
    const metaTds = hrow?.querySelectorAll('td');
    const metaDiv = metaTds ? metaTds[metaTds.length-1]?.querySelector('div[contenteditable]') : null;

    const entries = [];
    const titleRows = [...document.querySelectorAll(`tr.title-row[data-sec-id="${sec.id}"]`)];
    titleRows.forEach(trow => {
      const ds = [...trow.querySelectorAll('[contenteditable]')];
      const crow = trow.nextSibling;
      const cs = crow ? [...crow.querySelectorAll('[contenteditable]')] : [];
      const gs = d => d?.getAttribute('style')||'';
      const gva = d => d?.closest('td')?.dataset.va||'';
      entries.push({
        cat:   ds[0]?.textContent||'',
        title: ds[1]?.innerHTML||'',  ts:  gs(ds[1]),  tva:  gva(ds[1]),
        rtitle:ds[2]?.innerHTML||'',  rs:  gs(ds[2]),  rva:  gva(ds[2]),
        c1:    ds[3]?.innerHTML||'',  c1s: gs(ds[3]),  c1va: gva(ds[3]),
        c2:    ds[4]?.innerHTML||'',  c2s: gs(ds[4]),  c2va: gva(ds[4]),
        c3:    ds[5]?.innerHTML||'',  c3s: gs(ds[5]),  c3va: gva(ds[5]),
        date:  ds[6]?.textContent||'',
        link:  ds[7]?.textContent||'',
        body:  cs[0]?.innerHTML||'',  bs:  gs(cs[0]),  bva:  gva(cs[0]),
        rbody: cs[1]?.innerHTML||'',  rbs: gs(cs[1]),  rbva: gva(cs[1]),
      });
    });

    result.push({
      id: sec.id,
      name: nameDiv?.textContent || sec.name,
      tags: sec.tags || '',
      metaHeader: metaDiv?.textContent || sec.metaHeader || '',
      entries
    });
  });
  return result;
}

// CSV
function exportCSV() {
  collectCurrentTab();
  const tab = tabs.find(t=>t.id===activeTabId);
  if (!tab) return;
  let csv = '﻿탭,섹션,분류,제목,내용,댓글제목,댓글내용,댓글1,댓글2,댓글3,날짜,링크\n';
  tab.sections.forEach(sec => {
    sec.entries.forEach(e => {
      const row = [tab.name, sec.name, e.cat, e.title, e.body, e.rtitle, e.rbody, e.c1, e.c2, e.c3, e.date, e.link];
      csv += row.map(v=>`"${(v||'').replace(/"/g,'""')}"`).join(',') + '\n';
    });
  });
  const blob = new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='sns_sheet.csv'; a.click();
  URL.revokeObjectURL(url);
}

// 자동저장 (입력 즉시 + 주기적 백업)
// ═══════════════════════════════════════════════
let _saveTimer = null;

function autoSave() {
  collectCurrentTab();
  const localKey = USER_ID ? `snsSheet_tabs_${USER_ID}` : 'snsSheet_tabs_v2';
  localStorage.setItem(localKey, JSON.stringify({ tabs, activeTabId, savedAt: Date.now() }));
  // 저장 인디케이터 살짝 표시
  const badge = document.getElementById('savedBadge');
  badge.textContent = '✔ 자동저장됨';
  badge.style.display = 'inline';
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(() => { badge.style.display = 'none'; }, 1500);
}

function debouncedSave() {
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(autoSave, 800); // 입력 멈춘 뒤 0.8초 후 저장
}

// 시트 내 모든 입력에 반응
document.getElementById('sheetBody').addEventListener('input', debouncedSave);

// ─── 엑셀 스타일 셀 선택 ────────────────────────────────────────────────────
function clearSelection() {
  sheetBodyEl.querySelectorAll('.cell-selected').forEach(t => t.classList.remove('cell-selected'));
  selectedCells.clear();
}

const sheetBodyEl = document.getElementById('sheetBody');

// 더블클릭 → 편집모드 진입
sheetBodyEl.addEventListener('dblclick', e => {
  const div = e.target.closest('[contenteditable]');
  if (div) { div.focus(); }
});

// 키보드 이벤트용 포커스 앵커 (contenteditable 아님 → inEdit=false 보장)
const _kbFocus = document.createElement('div');
_kbFocus.setAttribute('tabindex', '-1');
_kbFocus.style.cssText = 'position:fixed;opacity:0;top:0;left:0;width:1px;height:1px;pointer-events:none;';
document.body.appendChild(_kbFocus);

// 싱글클릭 → 선택모드 (편집 안 함)
let _dragStartTd = null;
let _isDragging = false;

// 레이블·카테고리 셀 여부 확인 (선택/Delete 대상에서 제외)
const isUnselectableTd = td => td.classList.contains('lbl') || td.classList.contains('rlbl') || td.classList.contains('cat-cell');

sheetBodyEl.addEventListener('mousedown', e => {
  if (e.target.closest('tr.section-header')) return;
  if (e.target.closest('button')) return;       // 삭제버튼 등 무시
  const td = e.target.closest('td');
  if (!td || !td.querySelector('[contenteditable]')) return;
  if (isUnselectableTd(td)) return; // lbl, rlbl, 분류 셀 제외

  // 더블클릭은 편집모드: 선택 간섭 안 함
  if (e.detail >= 2) { _dragStartTd = null; _isDragging = false; return; }

  // 현재 편집 중이면 blur 후 선택 전환
  if (document.activeElement?.isContentEditable) {
    document.activeElement.blur();
  }

  _isDragging = true;
  _dragStartTd = td;

  // 선택 업데이트
  if (!e.shiftKey) clearSelection();
  selectedCells.add(td);
  td.classList.add('cell-selected');
  activeDiv = td.querySelector('[contenteditable]');
  activeTd = td;

  // 단일 클릭 시 셀 내용 자동 복사 (네이버카페 등 외부 에디터에 바로 붙여넣기 가능)
  if (!e.shiftKey && !e.ctrlKey && !e.metaKey) {
    const div = td.querySelector('[contenteditable]');
    if (div) {
      const text = (div.innerText || div.textContent || '').trim();
      const ph = div.getAttribute('data-ph') || '';
      if (text && text !== ph) copyToClipboard(text);
    }
  }

  // 키보드 이벤트 수신 보장 (Delete/Ctrl+C 등)
  _kbFocus.focus();

  e.preventDefault();   // contenteditable 자동 포커스 방지
}, true);

// 드래그로 다중 셀 선택 — 시작/현재 행 사이의 모든 행 전체 선택
let _lastHoverTd = null;
sheetBodyEl.addEventListener('mousemove', e => {
  if (!_isDragging || !_dragStartTd) return;
  if (e.target.closest('tr.section-header')) return;
  const td = e.target.closest('td');
  if (!td) return;
  if (td === _lastHoverTd) return;  // 같은 셀이면 재계산 생략
  _lastHoverTd = td;

  const allTrs = Array.from(sheetBodyEl.querySelectorAll('tr:not(.section-header)'));
  const startTr = _dragStartTd.closest('tr');
  const endTr   = td.closest('tr');
  const startIdx = allTrs.indexOf(startTr);
  const endIdx   = allTrs.indexOf(endTr);
  if (startIdx === -1 || endIdx === -1) return;

  clearSelection();
  const lo = Math.min(startIdx, endIdx), hi = Math.max(startIdx, endIdx);
  for (let i = lo; i <= hi; i++) {
    const hasCE = allTrs[i].querySelector('[contenteditable]');
    if (!hasCE) continue; // sep 행 등 편집 셀 없는 행은 건너뜀
    allTrs[i].querySelectorAll('td').forEach(t => {
      if (isUnselectableTd(t)) return; // 제목:/내용: 레이블, 분류 셀 제외
      t.classList.add('cell-selected'); // 빈 TD도 시각적으로 선택 표시
      const ce = t.querySelector('[contenteditable]');
      if (ce) { selectedCells.add(t); activeDiv = ce; activeTd = t; }
    });
  }
});
document.addEventListener('mouseup', () => { _isDragging = false; _lastHoverTd = null; });

// 셀 포커스 추적 — 편집모드 진입 시
sheetBodyEl.addEventListener('focusin', e => {
  const div = e.target.closest('[contenteditable]');
  if (!div) return;
  clearSelection();
  if (activeDiv && activeDiv !== div) {
    const prevTd = activeDiv.closest('td');
    if (prevTd) prevTd.classList.remove('cell-focused');
  }
  activeDiv = div;
  activeTd = div.closest('td');
  if (activeTd && !div.closest('tr.section-header')) {
    activeTd.classList.add('cell-focused');
  }
});
sheetBodyEl.addEventListener('focusout', e => {
  const div = e.target.closest('[contenteditable]');
  if (!div) return;
  const td = div.closest('td');
  if (td) {
    td.classList.remove('cell-focused');
    // 편집 종료 후 해당 셀 선택 상태로 유지
    if (!div.closest('tr.section-header')) {
      selectedCells.add(td);
      td.classList.add('cell-selected');
    }
  }
});

// 키보드 단축키
document.addEventListener('keydown', e => {
  const inEdit = document.activeElement?.isContentEditable;

  // Escape → 편집모드 탈출, 선택 유지
  if (e.key === 'Escape' && inEdit) {
    document.activeElement.blur();
    e.preventDefault();
    return;
  }

  if (!inEdit) {
    // Ctrl+C → 선택 셀 내용 복사 (편집모드 아닐 때)
    if ((e.ctrlKey || e.metaKey) && e.key === 'c' && selectedCells.size > 0) {
      const texts = [];
      selectedCells.forEach(td => {
        const div = td.querySelector('[contenteditable]');
        if (div) texts.push((div.innerText || div.textContent || '').trim());
      });
      copyToClipboard(texts.filter(Boolean).join('\n'));
      e.preventDefault(); return;
    }

    // Ctrl+Z → 전역 Undo
    if ((e.ctrlKey || e.metaKey) && !e.shiftKey && e.key === 'z') {
      undoAction(); e.preventDefault(); return;
    }
    // Ctrl+Y / Ctrl+Shift+Z → 전역 Redo
    if (((e.ctrlKey || e.metaKey) && e.key === 'y') ||
        ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'z')) {
      redoAction(); e.preventDefault(); return;
    }

    // Delete / Backspace → 선택한 셀 내용 전체 삭제
    if (e.key === 'Delete' || e.key === 'Backspace') {
      if (selectedCells.size > 0) {
        immediateUndoPush();  // 삭제 전 스냅샷
        selectedCells.forEach(td => {
          td.querySelectorAll('[contenteditable]').forEach(d => { d.innerHTML = ''; });
        });
        debouncedSave();
        e.preventDefault();
      }
      return;
    }
    // F2 → 선택한 셀 편집모드
    if (e.key === 'F2' && selectedCells.size === 1) {
      const td = [...selectedCells][0];
      const div = td.querySelector('[contenteditable]');
      if (div) { div.focus(); const r = document.createRange(); r.selectNodeContents(div); r.collapse(false); window.getSelection().removeAllRanges(); window.getSelection().addRange(r); }
      e.preventDefault();
      return;
    }
    // Ctrl+V / Ctrl+Shift+V / Cmd+V → 선택셀에 붙여넣기
    if ((e.ctrlKey || e.metaKey) && (e.key === 'v' || e.key === 'V') && selectedCells.size > 0) {
      _pasteTargetTd = [...selectedCells][0];
      const hp = document.getElementById('hiddenPaste');
      hp.innerHTML = '';
      hp.focus();
      // Don't preventDefault — let browser fire paste event on hiddenPaste
      return;
    }

    // 일반 문자 입력 → 선택셀 내용 지우고 편집모드
    if (e.key.length === 1 && !e.ctrlKey && !e.metaKey && !e.altKey && selectedCells.size === 1) {
      const td = [...selectedCells][0];
      const div = td.querySelector('[contenteditable]');
      if (div) { div.innerHTML = ''; div.focus(); }
    }
  }
});

// ── 복사 시 스타일 정화 (네이버카페 등 외부 에디터에 붙여넣을 때 배경색·폰트 오염 방지) ──
document.addEventListener('copy', e => {
  const active = document.activeElement;
  if (!active?.isContentEditable || !active.closest('#sheetBody')) return;
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || sel.rangeCount === 0) return;

  const plainText = sel.toString();
  const frag = sel.getRangeAt(0).cloneContents();
  const tmp = document.createElement('div');
  tmp.appendChild(frag);
  // background-color, font-size, font-family, color 제거 (bold/italic 등은 유지)
  tmp.querySelectorAll('[style]').forEach(el => {
    const s = el.style;
    ['background-color','font-size','font-family','color','text-align'].forEach(p => s.removeProperty(p));
    if (!el.getAttribute('style').trim()) el.removeAttribute('style');
  });

  e.clipboardData.setData('text/plain', plainText);
  e.clipboardData.setData('text/html', '<meta charset="utf-8">' + tmp.innerHTML);
  e.preventDefault();
});

// RFC 4180 TSV 파서 — 셀 내부의 \n (구글 시트 멀티라인 셀)을 올바르게 처리
function parseTSV(text) {
  const rows = [];
  let row = [], cell = '', inQuote = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (inQuote) {
      if (ch === '"') {
        if (text[i + 1] === '"') { cell += '"'; i++; }  // "" → 이스케이프된 따옴표
        else inQuote = false;                             // 따옴표 필드 종료
      } else {
        cell += ch;  // 필드 내부의 줄바꿈도 그대로 포함
      }
    } else {
      if (ch === '"' && cell === '') { inQuote = true; }
      else if (ch === '\t') { row.push(cell); cell = ''; }
      else if (ch === '\r') { /* CR 무시 */ }
      else if (ch === '\n') { row.push(cell); rows.push(row); row = []; cell = ''; }
      else { cell += ch; }
    }
  }
  row.push(cell);
  if (row.some(c => c.trim() !== '')) rows.push(row);
  return rows;
}

// 일반 텍스트를 innerHTML 안전하게 변환 (줄바꿈 → <br>)
function textToHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
          .replace(/\n/g, '<br>');
}

// trow의 contenteditable 셀들에 GS 열 데이터를 구조화해서 채움
// - startIdx: 채우기 시작할 trowDivs 인덱스 (보통 1 = mainDiv)
// - contentCols: 채울 내용 배열 [제목, 댓글..., 날짜, 링크]
// 마지막 열이 https://로 시작하면 linkDiv에, 그 앞이 날짜 형식이면 dateDiv에 고정 배치
function fillTrowDivs(trowDivs, contentCols, startIdx) {
  const isRS   = div => div.parentElement?.previousElementSibling?.classList?.contains('rlbl');
  const isDate = s => /^\d{4}[\.\-\/]\d{1,2}[\.\-\/]\d{1,2}$/.test(s.trim());
  const isLink = s => /^https?:\/\//.test(s.trim());
  if (!contentCols.length) return;
  const fillDivs = [];
  for (let i = startIdx; i < trowDivs.length; i++) {
    // 사용자가 명시적으로 선택한 시작 셀은 우측 셀이어도 포함
    if (i === startIdx || !isRS(trowDivs[i])) fillDivs.push(trowDivs[i]);
  }
  if (!fillDivs.length) return;
  fillDivs[0].innerHTML = textToHtml(contentCols[0]);
  let linkIdx = -1, dateIdx = -1;
  if (isLink(contentCols[contentCols.length - 1])) {
    linkIdx = contentCols.length - 1;
    if (contentCols.length >= 2 && isDate(contentCols[contentCols.length - 2])) {
      dateIdx = contentCols.length - 2;
    }
  } else if (isDate(contentCols[contentCols.length - 1])) {
    dateIdx = contentCols.length - 1;
  }
  const fixedCount = (dateIdx !== -1 ? 1 : 0) + (linkIdx !== -1 ? 1 : 0);
  if (linkIdx !== -1 && fillDivs.length >= 2) {
    fillDivs[fillDivs.length - 1].innerHTML = textToHtml(contentCols[linkIdx]);
  }
  if (dateIdx !== -1 && fillDivs.length >= (linkIdx !== -1 ? 3 : 2)) {
    fillDivs[fillDivs.length - (linkIdx !== -1 ? 2 : 1)].innerHTML = textToHtml(contentCols[dateIdx]);
  }
  const commentDivs = fillDivs.slice(1, fillDivs.length - fixedCount);
  const commentEnd  = dateIdx !== -1 ? dateIdx : (linkIdx !== -1 ? linkIdx : contentCols.length);
  for (let j = 1; j < commentEnd && (j - 1) < commentDivs.length; j++) {
    commentDivs[j - 1].innerHTML = textToHtml(contentCols[j]);
  }
}

// hiddenPaste → TSV 파싱 후 선택 셀에 분배
document.addEventListener('DOMContentLoaded', () => {
  const hp = document.getElementById('hiddenPaste');
  if (!hp) return;
  hp.addEventListener('paste', e => {
    e.preventDefault();
    const text = (e.clipboardData || window.clipboardData)?.getData('text/plain') || '';
    hp.innerHTML = '';
    hp.blur();
    try { _kbFocus.focus(); } catch(e) {}
    if (!text || !_pasteTargetTd) { _pasteTargetTd = null; return; }
    immediateUndoPush();  // 붙여넣기 전 스냅샷

    const targetTd = _pasteTargetTd;
    _pasteTargetTd = null;

    const parentRow = targetTd.closest('tr');
    const secId = parentRow?.dataset?.secId;
    const entryIdxStr = parentRow?.dataset?.entryIdx;

    const targetDiv = targetTd.querySelector('[contenteditable]');
    if (!targetDiv) return;

    // 섹션/행 정보가 없으면 단순 붙여넣기
    if (!secId || entryIdxStr === undefined) {
      targetDiv.innerHTML = textToHtml(text);
      debouncedSave(); return;
    }

    const rows = parseTSV(text);
    if (rows.length === 0) return;

    const startIdx = parseInt(entryIdxStr, 10);
    const sec = sections.find(s => s.id === secId);
    if (!sec) return;

    const rowDivs = Array.from(parentRow.querySelectorAll('[contenteditable]'));
    const divIdx = rowDivs.indexOf(targetDiv);

    // 레이블 감지
    const LABEL_RE    = /^(제목|내용)[*:]?\s*[:]\s*$/;
    const isLabel      = s => LABEL_RE.test(s.trim());
    const isTitleLabel = s => /^제목[*:]?\s*[:]\s*$/.test(s.trim());
    const isBodyLabel  = s => /^내용[*:]?\s*[:]\s*$/.test(s.trim());

    // 첫 3열 중 제목:/내용: 레이블 위치 탐색
    function detectRow(cols) {
      for (let ci = 0; ci < Math.min(3, cols.length); ci++) {
        if (isTitleLabel(cols[ci])) return { type: 'title', lci: ci };
        if (isBodyLabel(cols[ci]))  return { type: 'body',  lci: ci };
      }
      return { type: 'none', lci: -1 };
    }

    // GS 데이터에 제목:/내용: 레이블 구조가 있는지 확인 (첫 3열 탐색)
    const hasLabels = rows.some(r => detectRow(r).type !== 'none');

    // rlbl(우측 제목:/내용: 레이블) 바로 다음 셀 = 우측 복사 영역 → 항상 건너뜀
    const isRightSide = div => div.parentElement?.previousElementSibling?.classList?.contains('rlbl');

    const addRowEl = document.getElementById(`add-row-${secId}`);

    if (hasLabels) {
      // ── 레이블 기반: 제목:/내용: 쌍을 하나의 엔트리로 그루핑 ──────
      const groups = [];
      let pi = 0;
      while (pi < rows.length) {
        const dr = detectRow(rows[pi]);
        if (dr.type === 'title') {
          const titleCols = rows[pi];
          const titleStart = dr.lci + 1;
          let bodyCols = null, bodyStart = 0;
          if (pi + 1 < rows.length) {
            const nextDr = detectRow(rows[pi+1]);
            if (nextDr.type === 'body') {
              bodyCols = rows[pi+1];
              bodyStart = nextDr.lci + 1;
              pi += 2;
            } else { pi += 1; }
          } else { pi += 1; }
          groups.push({ titleCols, titleStart, bodyCols, bodyStart });
        } else if (dr.type === 'body') {
          // 고아 내용: 행 → 직전 그룹에 병합
          if (groups.length > 0 && !groups[groups.length-1].bodyCols) {
            groups[groups.length-1].bodyCols = rows[pi];
            groups[groups.length-1].bodyStart = dr.lci + 1;
          }
          pi++;
        } else { pi++; } // 빈 구분 행 등 무시
      }

      // 필요한 엔트리 미리 생성
      while (sec.entries.length < startIdx + groups.length) {
        const newE = { cat:'', title:'', body:'', rtitle:'', rbody:'', c1:'', c2:'', c3:'', link:'', date:'' };
        sec.entries.push(newE);
        renderEntry(secId, newE, sec.entries.length - 1, addRowEl);
      }

      groups.forEach(({ titleCols, titleStart, bodyCols, bodyStart }, gi) => {
        const entryIdx = startIdx + gi;
        const entryRow = document.querySelector(
          `tr.title-row[data-sec-id="${secId}"][data-entry-idx="${entryIdx}"]`
        );
        if (!entryRow) return;

        // trow 채우기 — 기존 내용 초기화(분류 제외) 후 덮어쓰기
        const trowDivs = Array.from(entryRow.querySelectorAll('[contenteditable]'));
        trowDivs.forEach(d => { if (!d.closest('td.cat-cell')) d.innerHTML = ''; });
        const clearCrow2 = entryRow.nextElementSibling;
        if (clearCrow2?.classList.contains('content-row')) {
          clearCrow2.querySelectorAll('[contenteditable]').forEach(d => { d.innerHTML = ''; });
        }
        if (titleStart > 1 && titleCols[0] && titleCols[0].trim() && !isLabel(titleCols[0])) {
          trowDivs[0].innerHTML = textToHtml(titleCols[0]); // 레이블 앞 열 → catDiv
        }
        fillTrowDivs(trowDivs, titleCols.slice(titleStart), 1);

        // crow 채우기
        if (bodyCols) {
          const crow = entryRow.nextElementSibling;
          if (crow?.classList.contains('content-row')) {
            const crowDivs = Array.from(crow.querySelectorAll('[contenteditable]'));
            let bColI = bodyStart;
            for (let i = 0; i < crowDivs.length; i++) {
              if (isRightSide(crowDivs[i])) continue; // rbodyDiv 건너뜀
              if (bColI >= bodyCols.length) break;
              crowDivs[i].innerHTML = textToHtml(bodyCols[bColI++]);
            }
          }
        }
      });

    } else {
      // ── 레이블 없음: divIdx 기반 rowsPerEntry ──────────────────────────
      // 내용 행(crow)의 셀을 선택한 경우 → trow의 mainDiv(index 1) 기준으로 취급
      const isCrowClick = parentRow.classList.contains('content-row');
      const effectiveDivIdx = isCrowClick ? 1 : divIdx;

      const firstEntryRow = document.querySelector(`tr.title-row[data-sec-id="${secId}"][data-entry-idx="${startIdx}"]`);
      const firstCrow = firstEntryRow?.nextElementSibling;
      // crow가 존재하면 항상 2줄 1세트(제목+내용) 구조로 처리
      // effectiveDivIdx 제한 제거 → catDiv(0) 클릭해도 rowsPerEntry=2 보장
      const hasCrowTarget = firstCrow?.classList.contains('content-row') &&
        firstCrow.querySelectorAll('[contenteditable]').length > 0;
      const rowsPerEntry = hasCrowTarget ? 2 : 1;
      // 채우기 시작점: 사용자가 선택한 셀(catDiv는 선택 불가이므로 항상 ≥1)
      const startFillIdx = effectiveDivIdx;

      const totalEntriesNeeded = Math.ceil(rows.length / rowsPerEntry);
      while (sec.entries.length < startIdx + totalEntriesNeeded) {
        const newE = { cat:'', title:'', body:'', rtitle:'', rbody:'', c1:'', c2:'', c3:'', link:'', date:'' };
        sec.entries.push(newE);
        renderEntry(secId, newE, sec.entries.length - 1, addRowEl);
      }

      rows.forEach((cols, rowOffset) => {
        const entryOffset = Math.floor(rowOffset / rowsPerEntry);
        const intraOffset = rowOffset % rowsPerEntry;
        const entryIdx = startIdx + entryOffset;
        if (entryIdx >= sec.entries.length) return;

        const entryRow = document.querySelector(
          `tr.title-row[data-sec-id="${secId}"][data-entry-idx="${entryIdx}"]`
        );
        if (!entryRow) return;

        if (intraOffset === 0) {
          const trowDivs = Array.from(entryRow.querySelectorAll('[contenteditable]'));
          // 채우기 범위(startFillIdx 이후)만 초기화, 분류 셀 제외 — 덮어쓰기
          trowDivs.forEach((d, idx) => {
            if (idx < startFillIdx || d.closest('td.cat-cell')) return;
            d.innerHTML = '';
          });
          const clearCrow = entryRow.nextElementSibling;
          if (clearCrow?.classList.contains('content-row')) {
            clearCrow.querySelectorAll('[contenteditable]').forEach(d => { d.innerHTML = ''; });
          }
          let colI = 0;
          while (colI < cols.length && (cols[colI].trim() === '' || isLabel(cols[colI]))) colI++;
          fillTrowDivs(trowDivs, cols.slice(colI), startFillIdx);
        } else {
          const crow = entryRow.nextElementSibling;
          if (!crow?.classList.contains('content-row')) return;
          const crowDivs = Array.from(crow.querySelectorAll('[contenteditable]'));
          if (!crowDivs.length) return;
          let colI = 0;
          // 선두 빈 열과 레이블 스킵
          while (colI < cols.length && (cols[colI].trim() === '' || isLabel(cols[colI]))) colI++;
          for (let i = 0; i < crowDivs.length; i++) {
            if (isRightSide(crowDivs[i])) continue; // rbodyDiv 건너뜀
            if (colI >= cols.length) break;
            crowDivs[i].innerHTML = textToHtml(cols[colI++]);
          }
        }
      });
    }

    debouncedSave();
  });
});

const SYNC_API = '/api/sheet-sync';

// URL 파라미터에서 userId 추출 (FranchisePanel iframe에서 전달)
const _urlParams = new URLSearchParams(location.search);
const USER_ID    = _urlParams.get('userId') || '';   // 로그인 유저 ID (자동 동기화)
let syncCode     = USER_ID || localStorage.getItem('snsSheet_syncCode') || '';

// userId 모드: 동기화 패널 숨기고 자동으로 클라우드 연동
const isUserMode = Boolean(USER_ID);

function updateSyncUI() {
  const btn  = document.querySelector('button[onclick="openSyncPanel()"]');
  const chip = document.getElementById('syncCodeChip');
  if (isUserMode) {
    // userId 모드: 동기화 버튼 숨기고 로그인 유저 표시
    if (btn)  btn.style.display = 'none';
    if (chip) { chip.textContent = '☁ ' + USER_ID; chip.style.display = 'inline'; }
  } else {
    updateChip();
  }
}

function openSyncPanel() {
  if (isUserMode) return; // userId 모드에선 패널 불필요
  document.getElementById('syncCodeInput').value = syncCode;
  document.getElementById('syncStatus').textContent = '';
  document.getElementById('syncPanel').style.display = 'block';
  document.getElementById('syncOverlay').style.display = 'block';
  document.getElementById('syncCodeInput').focus();
}

function closeSyncPanel() {
  document.getElementById('syncPanel').style.display = 'none';
  document.getElementById('syncOverlay').style.display = 'none';
}

function getSyncCode() {
  const val = document.getElementById('syncCodeInput').value.trim().toUpperCase();
  if (!val || val.length < 2) { setStatus('코드를 입력해주세요. (2자 이상)', 'err'); return null; }
  return val;
}

function setStatus(msg, type='ok') {
  const el = document.getElementById('syncStatus');
  el.textContent = msg; el.className = 'sync-status ' + type;
}

function updateChip() {
  const chip = document.getElementById('syncCodeChip');
  if (syncCode) { chip.textContent = '☁ ' + syncCode; chip.style.display = 'inline'; }
  else chip.style.display = 'none';
}

let _cloudBadgeTimer = null;
function showCloudBadge(msg, type) {
  const el = document.getElementById('cloudBadge');
  el.textContent = msg; el.className = 'cloud-badge ' + type; el.style.display = 'inline';
  clearTimeout(_cloudBadgeTimer);
  _cloudBadgeTimer = setTimeout(() => { el.style.display = 'none'; }, type === 'ok' ? 2000 : 5000);
}

// 클라우드에 저장
async function cloudSave(key) {
  collectCurrentTab();
  const res = await fetch(`${SYNC_API}?${USER_ID ? 'userId' : 'code'}=${encodeURIComponent(key)}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ payload: { tabs, activeTabId, savedAt: Date.now() } })
  });
  if (!res.ok) {
    const data = await res.json().catch(() => ({}));
    throw new Error(data.error || `HTTP ${res.status}`);
  }
}

// 클라우드에서 불러오기
async function cloudLoad(key) {
  const res = await fetch(`${SYNC_API}?${USER_ID ? 'userId' : 'code'}=${encodeURIComponent(key)}`);
  if (!res.ok) return null;
  return res.json();
}

async function syncUpload() {
  const code = getSyncCode(); if (!code) return;
  setStatus('업로드 중...', 'ok');
  try {
    const res = await fetch(`${SYNC_API}?code=${encodeURIComponent(code)}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ payload: { tabs, activeTabId } })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || '업로드 실패');
    syncCode = code;
    localStorage.setItem('snsSheet_syncCode', syncCode);
    updateChip();
    setStatus(`✔ "${code}" 코드로 저장됐습니다.`, 'ok');
  } catch(e) { setStatus('오류: ' + e.message, 'err'); }
}

async function syncDownload() {
  const code = getSyncCode(); if (!code) return;
  setStatus('불러오는 중...', 'ok');
  try {
    const data = await cloudLoad(code);
    if (!data) throw new Error('해당 코드의 데이터가 없습니다.');
    if (!confirm(`"${code}" 코드의 데이터를 불러옵니다.\n현재 작업 내용이 덮어씌워집니다. 계속할까요?`)) return;
    tabs = data.payload.tabs;
    activeTabId = data.payload.activeTabId || tabs[0]?.id;
    syncCode = code;
    localStorage.setItem('snsSheet_syncCode', syncCode);
    localStorage.setItem('snsSheet_tabs_v2', JSON.stringify({ tabs, activeTabId }));
    updateChip();
    renderTabBar();
    switchTab(activeTabId, false);
    const t = data.updated_at ? new Date(data.updated_at).toLocaleString('ko-KR') : '';
    setStatus(`✔ 불러오기 완료! (저장 시각: ${t})`, 'ok');
  } catch(e) { setStatus('오류: ' + e.message, 'err'); }
}

// 입력 시 클라우드 자동저장 (3초 debounce)
let _cloudTimer = null;
document.getElementById('sheetBody').addEventListener('input', () => {
  if (!syncCode) return;
  clearTimeout(_cloudTimer);
  _cloudTimer = setTimeout(async () => {
    try {
      await cloudSave(syncCode);
      showCloudBadge('☁ 클라우드 저장됨', 'ok');
    } catch(e) {
      showCloudBadge('⚠ 클라우드 저장 실패: ' + e.message, 'err');
    }
  }, 3000);
});

// ─── 초기화 ───
// 과거 하드코딩 샘플 섹션(witwork, casino) 자동 제거
const LEGACY_SAMPLE_IDS = new Set(['witwork', 'casino']);
function purgeOldSampleSections(tabsArr) {
  tabsArr.forEach(tab => {
    if (!Array.isArray(tab.sections)) return;
    tab.sections = tab.sections.filter(s => !LEGACY_SAMPLE_IDS.has(s.id));
  });
  return tabsArr;
}

async function init() {
  if (USER_ID) {
    // ① 로컬 캐시 먼저 확인
    let localData = null, localTime = 0;
    try {
      const raw = localStorage.getItem(`snsSheet_tabs_${USER_ID}`);
      if (raw) {
        const p = JSON.parse(raw);
        if (p?.tabs?.length > 0) { localData = p; localTime = p.savedAt || 0; }
      }
    } catch(e) {}

    // ② 클라우드 데이터 확인 (로컬이 있어도 반드시 체크해서 더 최신인지 비교)
    let cloudData = null, cloudTime = 0;
    try {
      const data = await cloudLoad(USER_ID);
      // tabs가 배열이면 저장된 상태로 인정 (빈 배열이어도 OK)
      if (data && Array.isArray(data.payload?.tabs)) {
        cloudData = data.payload;
        cloudTime = data.payload.savedAt || (data.updated_at ? new Date(data.updated_at).getTime() : 0);
      }
    } catch(e) {}

    // ③ 더 최신 데이터 사용 (타임스탬프 같으면 로컬 우선)
    let chosen = null;
    if (cloudData && cloudTime > localTime) {
      chosen = { ...cloudData, savedAt: cloudTime };
      localStorage.setItem(`snsSheet_tabs_${USER_ID}`, JSON.stringify(chosen));
    } else if (localData) {
      chosen = localData;
      if (cloudData && localTime > cloudTime) {
        try { await cloudSave(USER_ID); } catch(e) {}
      }
    } else if (cloudData) {
      chosen = { ...cloudData, savedAt: cloudTime };
      localStorage.setItem(`snsSheet_tabs_${USER_ID}`, JSON.stringify(chosen));
    }

    if (chosen) {
      tabs = chosen.tabs && chosen.tabs.length > 0 ? purgeOldSampleSections(chosen.tabs) : [];
      if (tabs.length === 0) {
        // 저장된 빈 상태: 빈 탭 하나 생성
        const blankId = makeTabId();
        tabs = [{ id: blankId, name: '탭1', sections: [] }];
      }
      activeTabId = chosen.activeTabId || tabs[0].id;
      renderTabBar(); switchTab(activeTabId, false); updateSyncUI();
      return;
    }
  } else {
    // 일반 모드: 기존 로컬 저장 불러오기
    const saved = localStorage.getItem('snsSheet_tabs_v2');
    if (saved) {
      try {
        const parsed = JSON.parse(saved);
        if (parsed?.tabs) {
          tabs = parsed.tabs.length > 0 ? purgeOldSampleSections(parsed.tabs) : [];
          if (tabs.length === 0) {
            const blankId = makeTabId();
            tabs = [{ id: blankId, name: '탭1', sections: [] }];
          }
          activeTabId = parsed.activeTabId || tabs[0].id;
          renderTabBar(); switchTab(activeTabId, false); updateSyncUI(); return;
        }
      } catch(e) {}
    }
  }
  // 처음 사용: 빈 탭
  const firstId = makeTabId();
  tabs = [{ id: firstId, name: '탭1', sections: [] }];
  activeTabId = firstId;
  renderTabBar();
  switchTab(activeTabId, false);
  updateSyncUI();
}

// autoSave도 userId 모드에선 클라우드에 함께 저장
const _baseAutoSave = autoSave;
window._autoSaveWithCloud = async function() {
  _baseAutoSave();
  if (syncCode) {
    try { await cloudSave(syncCode); } catch(e) {}
  }
};

// beforeunload 시 동기화 저장
window.addEventListener('beforeunload', () => {
  collectCurrentTab();
  const ts = Date.now();
  if (USER_ID) {
    localStorage.setItem(`snsSheet_tabs_${USER_ID}`, JSON.stringify({ tabs, activeTabId, savedAt: ts }));
  } else {
    localStorage.setItem('snsSheet_tabs_v2', JSON.stringify({ tabs, activeTabId, savedAt: ts }));
  }
});

init();
</script>
