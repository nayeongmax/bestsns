<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THEBESTSNS - All-in-One SMM Platform</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Noto+Sans+KR:wght@300;400;500;700;900&family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.portone.io/v2/browser-sdk.js"></script>
    <style>
        body { font-family: 'Inter', 'Noto Sans KR', sans-serif; margin: 0; padding: 0; background: #F8FAFC; }
        
        /* Floating Badge Animation */
        @keyframes float-badge {
            0%, 100% { transform: translate(-50%, 0); }
            50% { transform: translate(-50%, -6px); }
        }
        .animate-float-badge {
            animation: float-badge 2s ease-in-out infinite;
        }

        /* SHARP Lightsaber Streak Animation */
        .saber-streak {
            position: absolute;
            width: 600px;
            height: 2px;
            filter: blur(0.5px);
            opacity: 0;
            z-index: 5;
        }
        @keyframes saber-run {
            0% { left: -100%; opacity: 0; transform: scaleX(0.5); }
            5% { opacity: 1; transform: scaleX(1.2); }
            95% { opacity: 1; transform: scaleX(1.2); }
            100% { left: 200%; opacity: 0; transform: scaleX(0.5); }
        }
        .animate-saber-run { animation: saber-run 1.5s linear infinite; }
        .animate-saber-run-delay-1 { animation: saber-run 1.8s linear infinite 0.4s; }
        .animate-saber-run-delay-2 { animation: saber-run 2s linear infinite 0.8s; }
        .animate-saber-run-delay-3 { animation: saber-run 1.6s linear infinite 1.2s; }

        @keyframes punch-in {
            0% { transform: scale(0.85) translateY(10px); opacity: 0; filter: blur(10px); }
            100% { transform: scale(1) translateY(0); opacity: 1; filter: blur(0px); }
        }
        .animate-punch-in {
            animation: punch-in 0.6s cubic-bezier(0.17, 0.67, 0.83, 0.67) forwards;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Notification Fade In */
        .notification-fade {
            animation: slideInRight 0.5s ease-out forwards;
        }
        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(22px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(-4deg); }
            50% { transform: translateY(-16px) rotate(4deg); }
        }
        .auth-card-enter {
            animation: fadeUp 0.55s ease both;
        }
        .auth-rocket-float {
            animation: float 3.8s ease-in-out infinite;
        }
    </style>
